<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>絵馬棚</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    background: #f3efe8;
    color: #2b2b2b;
    min-height: 100vh;
    padding: 0;
  }

  .banner {
    width: 100%;
    display: block;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .banner:active { transform: scale(0.98); }
  .banner img {
    width: 100%;
    display: block;
  }

  .content {
    display: none;
    padding: 22px 18px 40px;
    max-width: 480px;
    margin: 0 auto;
  }
  .content.show {
    display: block;
  }

  .ema-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .ema-card {
    background: #fffdf8;
    border: 2px solid #d8c9a0;
    border-radius: 12px;
    padding: 16px 18px;
    position: relative;
  }
  .ema-card.achieved {
    background: #fff6e0;
    border-color: #d4a847;
  }
  .ema-card .ema-text {
    font-size: 16px;
    line-height: 1.6;
    color: #333;
    margin-bottom: 10px;
    word-break: break-word;
    padding-right: 50px;
  }
  .ema-card .ema-date {
    font-size: 11px;
    color: #999;
  }
  .ema-card .ema-stamp {
    position: absolute;
    top: 12px;
    right: 14px;
    color: #b03a2e;
    border: 2px solid #b03a2e;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 900;
    transform: rotate(-12deg);
    opacity: 0;
  }
  .ema-card.achieved .ema-stamp {
    opacity: 1;
  }
  .ema-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .ema-actions button {
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 16px;
    border: 1px solid #d8c9a0;
    background: #fff;
    color: #777;
    font-family: inherit;
    cursor: pointer;
  }
  .ema-actions button.achieve-btn.done {
    background: #b03a2e;
    color: #fff;
    border-color: #b03a2e;
  }
  .empty-msg {
    text-align: center;
    color: #999;
    font-size: 14px;
    padding: 60px 20px;
    line-height: 1.8;
  }
</style>
</head>

  <div class="content" id="contentArea">
    <div class="ema-list" id="emaList"></div>
  </div>

<script>
  const EMA_KEY = "asobiva_emas";

  function openContent() {
    document.getElementById('bannerBtn').style.display = 'none';
    document.getElementById('contentArea').classList.add('show');
    renderEmaList();
  }

  function loadEmas() {
    try {
      const raw = localStorage.getItem(EMA_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }
  function saveEmas(emas) {
    localStorage.setItem(EMA_KEY, JSON.stringify(emas));
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderEmaList() {
    const emas = loadEmas();
    const listEl = document.getElementById('emaList');

    if (emas.length === 0) {
      listEl.innerHTML = '<div class="empty-msg">まだ絵馬が奉納されていません。<br>「奉納所」から最初の願いを奉納してみましょう。</div>';
      return;
    }

    listEl.innerHTML = emas.map(ema => `
      <div class="ema-card ${ema.achieved ? 'achieved' : ''}" data-id="${ema.id}">
        <div class="ema-stamp">叶う</div>
        <div class="ema-text">${escapeHtml(ema.text)}</div>
        <div class="ema-date">${formatDate(ema.date)}</div>
        <div class="ema-actions">
          <button class="achieve-btn ${ema.achieved ? 'done' : ''}" onclick="toggleAchieved(${ema.id})">
            ${ema.achieved ? '叶いました' : '願いが叶ったら'}
          </button>
          <button onclick="deleteEma(${ema.id})">削除</button>
        </div>
      </div>
    `).join('');
  }

  function toggleAchieved(id) {
    const emas = loadEmas();
    const target = emas.find(e => e.id === id);
    if (target) target.achieved = !target.achieved;
    saveEmas(emas);
    renderEmaList();
  }

  function deleteEma(id) {
    let emas = loadEmas();
    emas = emas.filter(e => e.id !== id);
    saveEmas(emas);
    renderEmaList();
  }
</script>
