<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASOBIVA — GAMES</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f3f3f3;
  --white: #ffffff;
  --ink: #1a1a1a;
  --ink-soft: #888;
  --border: #e0e0e0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

.wrap {
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  min-height: 100vh;
}

/* ── SITE HEADER (back + burger) ── */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.back-link {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
  text-decoration: none;
  transition: color 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.back-link:hover { color: var(--ink); }
.burger-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  align-items: flex-end;
}
.burger-btn span {
  display: block;
  height: 1.5px;
  background: var(--ink);
  border-radius: 1px;
  transition: width 0.15s;
}
.burger-btn span:nth-child(1) { width: 20px; }
.burger-btn span:nth-child(2) { width: 14px; }
.burger-btn span:nth-child(3) { width: 20px; }
.burger-btn:hover span { width: 20px; }

/* ── BURGER MENU DROPDOWN ── */
.burger-menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 12px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  overflow: hidden;
  z-index: 200;
  min-width: 120px;
}
.burger-menu.open { display: block; }
.burger-menu-item {
  display: block;
  width: 100%;
  padding: 14px 20px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  text-align: left;
  transition: background 0.15s;
}
.burger-menu-item:last-child { border-bottom: none; }
.burger-menu-item:hover { background: var(--bg); }
.burger-menu-item.active { color: var(--white); background: var(--ink); }

.banner-slot {
  width: 100%;
  position: relative;
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 80px;
}
.banner-slot img {
  width: 100%;
  height: auto;
  display: block;
}
.slot-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: #ccc;
  user-select: none;
}

.banner-edit {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2;
}
.banner-edit span {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: #fff;
  background: rgba(0,0,0,0.45);
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.4);
  pointer-events: none;
}
body.admin-mode .banner-slot .banner-edit { display: flex; }
.banner-file { display: none; }

/* ── CARDS (image / html, same as other ASOBIVA pages) ── */
.card-section {
  background: var(--bg);
  padding-top: 10px;
}
.card {
  width: 100%;
  position: relative;
  display: block;
  text-decoration: none;
  background: var(--white);
  overflow: hidden;
}
.card img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.35s ease;
}
.card:hover img { transform: scale(1.015); }
body.admin-mode .card:hover img { transform: none; }

/* ── HTML CARD ── */
.html-card {
  width: 100%;
  position: relative;
  background: var(--white);
  overflow: hidden;
}
.html-card iframe {
  display: block;
  width: 100%;
  height: 100px;
  border: none;
  background: var(--white);
}
.html-card-label {
  display: none;
  padding: 8px 16px;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  background: var(--white);
  border-bottom: 1px solid var(--border);
}
body.admin-mode .html-card-label { display: block; }

/* ── CAROUSEL CARD ── */
.carousel-card {
  width: 100%;
  position: relative;
  background: var(--white);
  overflow: hidden;
  cursor: pointer;
}
.carousel-card img {
  width: 100%;
  height: auto;
  display: block;
}
.carousel-dots {
  position: absolute;
  bottom: 10px;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 6px;
  pointer-events: none;
}
.carousel-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  transition: background 0.2s, transform 0.2s;
}
.carousel-dots span.active {
  background: #fff;
  transform: scale(1.25);
}
.carousel-count {
  position: absolute;
  top: 10px; right: 10px;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: #fff;
  background: rgba(0,0,0,0.45);
  padding: 3px 8px;
  border-radius: 20px;
  pointer-events: none;
}

/* ── GAME CARD (square corners, no text, demo preview only) ── */
.game-card {
  width: 100%;
  position: relative;
  background: #0a0a12;
  overflow: hidden;
  border-radius: 0;
}
.game-card-frame-wrap {
  width: 100%;
  background: #0a0a12;
  position: relative;
  overflow: hidden;
  line-height: 0; /* avoid extra inline-level whitespace gap below the iframe */
}
.game-card-frame-wrap iframe {
  display: block;
  border: none;
  margin: 0 auto;
  pointer-events: none !important;
  /* width/height are set inline via JS (px), sized directly to the card's
     real display size. The games use 100vw/100vh internally, so they
     naturally fit this box with no transform/zoom involved — frameWrap's
     height is simply the iframe's own box height via normal flow. */
}
.game-card-tap {
  position: absolute;
  inset: 0;
  z-index: 3;
  cursor: pointer;
  pointer-events: auto !important;
}

/* ── DEL / REPLACE BUTTONS (shared by all card types) ── */
.card-del {
  display: none;
  position: absolute;
  top: 10px; right: 10px;
  width: 30px; height: 30px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  z-index: 5;
  transition: background 0.15s;
}
.card-del:hover { background: #c0392b; }
body.admin-mode .card-del { display: flex; }

.card-replace {
  display: none;
  position: absolute;
  top: 10px; right: 50px;
  width: 30px; height: 30px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  z-index: 5;
  transition: background 0.15s;
}
.card-replace:hover { background: #1a6e3c; }
body.admin-mode .card-replace { display: flex; }

.card-replace-input { display: none; }

/* ── ADD BUTTON ── */
.add-section {
  background: var(--bg);
  padding-top: 10px;
}
.add-card-btn {
  display: flex;
  width: 100%;
  padding: 22px 16px;
  background: var(--white);
  border: none;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  transition: background 0.15s, color 0.15s;
}
.add-card-btn:hover { background: #f5f5f5; color: var(--ink); }

/* ── EMPTY STATE ── */
.empty-section {
  background: var(--bg);
  padding-top: 10px;
}
.empty-state {
  padding: 60px 24px;
  text-align: center;
  color: var(--ink-soft);
  font-size: 13px;
  line-height: 2;
  background: var(--white);
}
.empty-state strong {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}

/* ── FOOTER ── */
.footer-section {
  background: var(--bg);
  padding-top: 10px;
}
footer {
  padding: 28px 16px;
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  background: var(--white);
}

/* ── PANEL ── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.28);
  z-index: 200;
  backdrop-filter: blur(2px);
}
.overlay.open { display: block; }

.panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-radius: 16px 16px 0 0;
  padding: 28px 20px 48px;
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  max-width: 480px;
  margin: 0 auto;
}
.panel.open { transform: translateY(0); }

.panel-handle {
  width: 36px; height: 4px;
  background: var(--border); border-radius: 2px;
  margin: 0 auto 22px;
}
.panel-title {
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.06em; margin-bottom: 18px; color: var(--ink);
}

.drop-zone {
  border: 2px dashed var(--border); border-radius: 10px;
  padding: 26px 16px; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 12px; background: #fafafa; position: relative;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--ink); background: #f0f0f0; }
.drop-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.dz-icon { font-size: 24px; margin-bottom: 6px; }
.dz-label { font-size: 12px; font-weight: 500; color: var(--ink); display: block; margin-bottom: 4px; }
.dz-hint { font-size: 11px; color: var(--ink-soft); }

.preview-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 6px; margin-bottom: 14px;
}
.p-thumb { aspect-ratio: 1; border-radius: 6px; overflow: hidden; position: relative; background: var(--border); }
.p-thumb img { width: 100%; height: 100%; object-fit: cover; }
.p-thumb-file {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  padding: 8px 22px 8px 8px;
  font-size: 9px;
  color: var(--ink);
  word-break: break-all;
  line-height: 1.4;
  background: #f0ede6;
}
.p-thumb-name { display: block; }
.p-del {
  position: absolute; top: 3px; right: 3px;
  width: 18px; height: 18px; background: rgba(0,0,0,0.5); color: #fff;
  border: none; border-radius: 50%; font-size: 9px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.field-label {
  font-size: 11px; font-weight: 400; color: var(--ink-soft);
  letter-spacing: 0.06em; margin-bottom: 6px; display: block;
}
.field-input {
  width: 100%; font-size: 14px; padding: 12px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  background: #fafafa; color: var(--ink); outline: none;
  transition: border-color 0.15s; margin-bottom: 16px;
}
.field-input:focus { border-color: var(--ink); }
.field-input::placeholder { color: var(--ink-soft); font-size: 13px; }

.carousel-toggle {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--ink);
  padding: 10px 4px; margin-bottom: 6px;
  cursor: pointer;
}
.carousel-toggle input { width: 16px; height: 16px; flex-shrink: 0; }

.btn-add {
  width: 100%; padding: 15px;
  background: var(--ink); color: var(--white);
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; letter-spacing: 0.06em;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-add:hover { opacity: 0.8; }
.btn-add:disabled { opacity: 0.28; cursor: default; }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; gap: 12px;
}
.loading-text {
  font-size: 11px; letter-spacing: 0.1em; color: #aaa;
}
.loading-bar-wrap {
  width: 120px; height: 3px;
  background: #e0e0e0; border-radius: 2px; overflow: hidden;
}
.loading-bar {
  height: 100%; width: 0%;
  background: var(--ink); border-radius: 2px;
  transition: width 0.3s ease;
}

/* ── FULLSCREEN GAME OVERLAY ── */
.fullscreen-overlay {
  position: fixed;
  inset: 0;
  background: #0a0a12;
  z-index: 500;
  display: none;
  flex-direction: column;
}
.fullscreen-overlay.open { display: flex; }

.fullscreen-topbar {
  flex-shrink: 0;
  display: flex;
  justify-content: flex-end;
  padding: 10px 12px;
  background: #0a0a12;
}

.close-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.close-btn:active {
  background: rgba(255,255,255,0.18);
}

.fullscreen-frame-wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fullscreen-frame-wrap iframe {
  width: 100%;
  height: 100%;
  max-width: 480px;
  border: none;
  background: #0a0a12;
}

/* ── TAP TO START prompt shown over the fullscreen demo until the player taps ──
   positioned below the topbar (not inset:0 on the whole overlay), so the
   close (✕) button stays clickable even while this prompt is showing */
.tap-to-start {
  position: absolute;
  top: 56px; /* below the fullscreen-topbar so the close (✕) button stays clickable */
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 10;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(10,10,18,0.35);
  cursor: pointer;
}
.tap-to-start.show { display: flex; }

.tap-to-start-circle {
  width: 132px;
  height: 132px;
  border-radius: 50%;
  border: 2px solid #39ff7a;
  background: rgba(10,10,18,0.85);
  color: #39ff7a;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.08em;
  line-height: 1.5;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-shadow: 0 0 8px #39ff7a;
  box-shadow: 0 0 22px rgba(57,255,122,0.35);
  animation: pulseRing 1.6s ease-in-out infinite;
}

@keyframes pulseRing {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

@media (prefers-reduced-motion: reduce) {
  .card img, .panel { transition: none; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-text">読み込み中…</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
</div>

<div class="wrap">
  <div class="site-header">
    <a href="asobiva.html" class="back-link">← トップへ戻る</a>
    <div style="position:relative;">
      <button class="burger-btn" id="burgerBtn" onclick="toggleBurgerMenu()">
        <span></span><span></span><span></span>
      </button>
      <div class="burger-menu" id="burgerMenu">
        <button class="burger-menu-item" id="adminBtn" onclick="toggleAdmin(); closeBurgerMenu()">管理</button>
        <button class="burger-menu-item" onclick="downloadHTML(); closeBurgerMenu()">保存</button>
      </div>
    </div>
  </div>
  <div class="header-pair">
    <div class="banner-slot" id="banner1">
      <span class="slot-label">HEADER</span>
      <div class="banner-edit" onclick="triggerBanner(1)"><span>画像を設定</span></div>
      <input type="file" class="banner-file" id="bannerFile1" accept="image/*" onchange="onBannerFile(1,this)">
    </div>
  </div>

  <div id="cardContainer"></div>

  <div class="footer-section">
    <footer>ASOBIVA — i.roiro</footer>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-title">カードを追加</div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*,text/html,.html" multiple onchange="onFileSelect(this.files)">
    <div class="dz-icon">📄🖼️</div>
    <span class="dz-label">画像 または HTMLファイルを選択 / ドロップ</span>
    <span class="dz-hint">JPG · PNG · GIF · WEBP · HTML（ゲームのHTMLもOK）　複数選択可</span>
  </div>
  <div class="preview-grid" id="previewGrid"></div>
  <label class="carousel-toggle" id="carouselToggleWrap" style="display:none;">
    <input type="checkbox" id="carouselToggle">
    <span>選んだ画像を1枚のカードにまとめる（カルーセル）</span>
  </label>
  <label class="field-label" for="linkUrl">リンク先URL（任意・ゲーム以外のHTML/画像カード用）</label>
  <input class="field-input" id="linkUrl" type="url" placeholder="https://note.com/...">
  <button class="btn-add" id="addBtn" onclick="addCards()" disabled>追加する</button>
</div>

<div class="fullscreen-overlay" id="fullscreenOverlay">
  <div class="fullscreen-topbar">
    <button class="close-btn" id="closeFullscreenBtn">✕</button>
  </div>
  <div class="fullscreen-frame-wrap" id="fullscreenFrameWrap"></div>
  <div class="tap-to-start" id="tapToStart">
    <div class="tap-to-start-circle">TAP TO<br>START</div>
  </div>
</div>

<script>
// Used for: (1) the fixed preview-card aspect ratio in the card list, and
// (2) the initial iframe size for the static download snapshot's markup
// (a real value is needed there since it has no live JS measurement pass
// before first paint). Not used for fullscreen play — that's always 100%.
const CARD_ASPECT_W = 320;
const CARD_ASPECT_H = 560;

// ── IndexedDB (Base64ストレージ) ──────────────
const DB_NAME = 'asobiva_games_b64';
let db;

function openDB() {
  return new Promise((res) => {
    try {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('cards'))
          d.createObjectStore('cards', { keyPath: 'id', autoIncrement: true });
        if (!d.objectStoreNames.contains('banners'))
          d.createObjectStore('banners', { keyPath: 'slot' });
      };
      req.onsuccess = e => { db = e.target.result; res(); };
      req.onerror = () => { db = null; res(); };
    } catch (err) {
      db = null;
      res();
    }
  });
}

function dbOp(store, mode, fn) {
  if (!db) {
    return Promise.resolve(mode === 'readonly' && store === 'cards' ? [] : undefined);
  }
  return new Promise((res, rej) => {
    const req = fn(db.transaction(store, mode).objectStore(store));
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e);
  });
}

// ── ファイル → Base64 / テキスト変換 ──────────
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}
function fileToText(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsText(file, 'UTF-8');
  });
}

// ── HTML種別の判定: ゲーム用HTML か 通常HTML か ──
// ゲーム本体には目印として window.ASOBIVA_GAME = true; を含める想定。
// 含まれていない通常のHTML（記事・ツール等）は従来通りの html-card として扱う。
function isGameHtml(html) {
  return /ASOBIVA_GAME\s*=\s*true/.test(html)
    || /id=["']demoBadge["']/.test(html)
    || /<canvas[\s>]/.test(html)
    || /#39ff7a/.test(html)
    || /PROTOTYPE\s+v/.test(html)
    || /exitDemoIfActive/.test(html);
}

// ── iframe高さ自動調整（通常HTMLカード用） ─────
function injectAutoResize(html) {
  const script = `
<scr` + `ipt>
(function(){
  function reportHeight(){
    var h = document.documentElement.scrollHeight;
    parent.postMessage({ type: 'asobiva-resize', height: h }, '*');
  }
  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'asobiva-init') reportHeight();
  });
  window.addEventListener('load', reportHeight);
  if (document.readyState === 'complete') reportHeight();
  window.addEventListener('resize', reportHeight);
  if (window.ResizeObserver) {
    new ResizeObserver(reportHeight).observe(document.body);
  }
})();
</scr` + `ipt>`;
  if (/<\/body>/i.test(html)) {
    return html.replace(/<\/body>/i, script + '</body>');
  }
  return html + script;
}

// ── iframeリサイズメッセージ受信（通常HTMLカード用） ──
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'asobiva-resize') {
    document.querySelectorAll('.html-card iframe').forEach(f => {
      if (f.contentWindow === e.source) {
        f.style.height = Math.max(60, e.data.height) + 'px';
      }
    });
  }
});

// ── State ─────────────────────────────────────
let cards = [];       // [{ id, type: 'image'|'html'|'carousel'|'game', html?, base64?, images?, name?, link }]
let banners = { 1: null };
let pendingFiles = [];
let adminMode = false;

// ── Init ──────────────────────────────────────
async function init() {
  try {
    setLoadingBar(10);
    await openDB();
    setLoadingBar(30);

    try {
      const row = await dbOp('banners', 'readonly', s => s.get(1));
      if (row?.base64) { banners[1] = row.base64; applyBanner(1, row.base64); }
    } catch {}
    setLoadingBar(60);

    const rows = await dbOp('cards', 'readonly', s => s.getAll());
    cards = (rows || []).map(r => ({
      id: r.id,
      type: r.type || 'html',
      html: r.html,
      base64: r.base64,
      images: r.images,
      name: r.name || '',
      link: r.link || ''
    }));
    setLoadingBar(100);
  } catch (err) {
    console.error('init error:', err);
  }

  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    render();
  }, 200);
}

function setLoadingBar(pct) {
  document.getElementById('loadingBar').style.width = pct + '%';
}

// ── Banners ───────────────────────────────────
function triggerBanner(slot) {
  document.getElementById('bannerFile' + slot).click();
}
async function onBannerFile(slot, input) {
  const f = input.files[0];
  if (!f) return;
  const base64 = await fileToBase64(f);
  await dbOp('banners', 'readwrite', s => s.put({ slot, base64 }));
  banners[slot] = base64;
  applyBanner(slot, base64);
}
function applyBanner(slot, base64) {
  const el = document.getElementById('banner' + slot);
  el.querySelector('.slot-label')?.remove();
  el.querySelector('img')?.remove();
  const img = document.createElement('img');
  img.src = base64;
  img.alt = '';
  el.insertBefore(img, el.querySelector('.banner-edit'));
}

// ── Render ────────────────────────────────────
function render() {
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';

  if (cards.length === 0 && !adminMode) {
    const sec = document.createElement('div');
    sec.className = 'empty-section';
    sec.innerHTML = '<div class="empty-state"><strong>まだゲーム／カードがありません</strong>右上の「管理」から追加できます</div>';
    container.appendChild(sec);
  }

  const gameFramesToScale = []; // [{frameWrap, iframe}] — scaled after full DOM attachment below

  cards.forEach(c => {
    const sec = document.createElement('div');
    sec.className = 'card-section';

    let wrap, replaceAccept, supportsReplace = true;

    const effectiveType = (c.type === 'html' && c.html && isGameHtml(c.html)) ? 'game' : c.type;
    if (effectiveType === 'game') {
      wrap = document.createElement('div');
      wrap.className = 'game-card';

      const frameWrap = document.createElement('div');
      frameWrap.className = 'game-card-frame-wrap';

      const iframe = document.createElement('iframe');
      iframe.srcdoc = c.html;
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
      // Sized directly to the card's real display width/height — no CSS
      // transform:scale or zoom involved. The games use 100vw/100vh
      // internally, so setting the iframe's actual box to the target size
      // makes the game render at exactly that size on its own. This avoids
      // an entire class of bugs where a transform/zoom-based shrink and a
      // separately-calculated wrapper height could fall out of sync
      // (confirmed to happen on iOS Safari even when correct on desktop).
      frameWrap.appendChild(iframe);

      const tapCatcher = document.createElement('div');
      tapCatcher.className = 'game-card-tap';
      let _tsy = 0;
      tapCatcher.addEventListener('touchstart', (e) => { _tsy = e.touches[0].clientY; }, { passive: true });
      tapCatcher.addEventListener('touchend', (e) => {
        if (Math.abs(e.changedTouches[0].clientY - _tsy) > 12) return;
        e.preventDefault();
        if (adminMode) return;
        openFullscreenGame(c.html);
      }, { passive: false });
      tapCatcher.addEventListener('click', () => {
        if (adminMode) return;
        openFullscreenGame(c.html);
      });
      frameWrap.appendChild(tapCatcher);

      wrap.appendChild(frameWrap);
      gameFramesToScale.push({ frameWrap, iframe });

      replaceAccept = '.html,text/html';
    } else if (effectiveType === 'image') {
      wrap = document.createElement('a');
      wrap.className = 'card';
      wrap.href = adminMode ? '#' : (c.link || '#');
      if (!adminMode && c.link) wrap.target = '_blank';
      wrap.rel = 'noopener';

      const img = document.createElement('img');
      img.src = c.base64;
      img.alt = '';
      img.loading = 'lazy';
      wrap.appendChild(img);
      replaceAccept = 'image/*,text/html,.html';
    } else if (effectiveType === 'carousel') {
      wrap = document.createElement('div');
      wrap.className = 'carousel-card';
      wrap.dataset.index = '0';

      const img = document.createElement('img');
      img.src = c.images[0];
      img.alt = '';
      img.loading = 'lazy';
      wrap.appendChild(img);

      if (c.images.length > 1) {
        const dots = document.createElement('div');
        dots.className = 'carousel-dots';
        c.images.forEach((_, idx) => {
          const dot = document.createElement('span');
          if (idx === 0) dot.classList.add('active');
          dots.appendChild(dot);
        });
        wrap.appendChild(dots);

        const count = document.createElement('div');
        count.className = 'carousel-count';
        count.textContent = `1 / ${c.images.length}`;
        wrap.appendChild(count);

        wrap.addEventListener('click', e => {
          if (adminMode) return;
          e.preventDefault();
          let idx = (parseInt(wrap.dataset.index, 10) + 1) % c.images.length;
          wrap.dataset.index = String(idx);
          img.src = c.images[idx];
          dots.querySelectorAll('span').forEach((d, i) => d.classList.toggle('active', i === idx));
          count.textContent = `${idx + 1} / ${c.images.length}`;
        });
      }
      supportsReplace = false;
    } else {
      // plain html-card (non-game HTML content, e.g. articles/tools)
      wrap = document.createElement('div');
      wrap.className = 'html-card';

      const label = document.createElement('div');
      label.className = 'html-card-label';
      label.textContent = c.name || '(無題)';

      const iframe = document.createElement('iframe');
      iframe.srcdoc = injectAutoResize(c.html);
      iframe.loading = 'lazy';
      iframe.sandbox = 'allow-scripts allow-popups allow-forms allow-same-origin';
      iframe.addEventListener('load', () => {
        iframe.contentWindow.postMessage({ type: 'asobiva-init' }, '*');
      });

      wrap.appendChild(label);
      wrap.appendChild(iframe);
      replaceAccept = 'image/*,text/html,.html';
    }

    let replaceBtn, replaceInput;
    if (supportsReplace) {
      replaceBtn = document.createElement('button');
      replaceBtn.className = 'card-replace';
      replaceBtn.title = '差し替え';
      replaceBtn.textContent = '⇄';

      replaceInput = document.createElement('input');
      replaceInput.type = 'file';
      replaceInput.accept = replaceAccept;
      replaceInput.className = 'card-replace-input';
      replaceInput.addEventListener('change', e => {
        e.preventDefault(); e.stopPropagation();
        const f = e.target.files[0];
        if (f) replaceCard(c.id, f);
      });

      replaceBtn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        replaceInput.click();
      });
    }

    const delBtn = document.createElement('button');
    delBtn.className = 'card-del';
    delBtn.title = '削除';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      deleteCard(c.id);
    });

    if (supportsReplace) {
      wrap.appendChild(replaceBtn);
      wrap.appendChild(replaceInput);
    }
    wrap.appendChild(delBtn);
    sec.appendChild(wrap);
    container.appendChild(sec);
  });

  if (adminMode) {
    const addSec = document.createElement('div');
    addSec.className = 'add-section';
    const btn = document.createElement('button');
    btn.className = 'add-card-btn';
    btn.onclick = openPanel;
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> カードを追加`;
    addSec.appendChild(btn);
    container.appendChild(addSec);
  }

  // now that every card is attached to the live DOM, frameWrap has a real
  // clientWidth — safe to compute and apply the scale transform here
  gameFramesToScale.forEach(({ frameWrap, iframe }) => sizeGameIframeToCard(frameWrap, iframe));
}

// ── ゲームカード用: 直接サイズ指定 ────────────────
// 3つのゲームはいずれも内部で `width:100vw; height:100vh;` を使っているため、
// iframe の実際の width/height 属性をカードの表示サイズに直接合わせるだけで、
// ゲーム自身がそのサイズにフィットして描画される。
// transform:scale や zoom のような「後から縮小する」処理を使うと、縮小後の
// 見た目とラッパーの高さを JS で別々に計算・同期する必要が生じ、その同期が
// 実機(iOS Safari)でズレることが確認されたため、この方式に統一した。
// CARD_ASPECT_W/H は上部で定義済み（プレビューカードの固定縦横比）。

function sizeGameIframeToCard(frameWrap, iframe) {
  const apply = () => {
    const cardW = frameWrap.clientWidth || Math.min(window.innerWidth, 480);
    if (!cardW) return;
    // ゲームはCARD_ASPECT_W (320px) ネイティブ設計なので、
    // 幅を320px以上に引き伸ばさず、高さも固定値で全コンテンツを表示する。
    const w = Math.min(cardW, CARD_ASPECT_W);
    const h = CARD_ASPECT_H;
    iframe.width = w;
    iframe.height = h;
  };
  apply();
  // iOS Safari can take an extra frame (or a brief moment) to settle its
  // internal layout after an iframe's width/height attributes change,
  // especially right after the card is first attached to the DOM. Re-apply
  // on the next frame and once more shortly after as a safety net.
  requestAnimationFrame(apply);
  setTimeout(apply, 150);
  if (window.ResizeObserver) {
    const ro = new ResizeObserver(() => {
      if (frameWrap.clientWidth > 0) apply();
    });
    ro.observe(frameWrap);
  }
}

// ── フルスクリーン再生 ──────────────────────────
function openFullscreenGame(html) {
  const overlay = document.getElementById('fullscreenOverlay');
  const frameWrap = document.getElementById('fullscreenFrameWrap');
  frameWrap.innerHTML = '';

  const iframe = document.createElement('iframe');
  iframe.srcdoc = html; // fresh instance so demo restarts cleanly each time
  iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
  frameWrap.appendChild(iframe);

  overlay.classList.add('open');

  // show "TAP TO START" over the demo until the player taps it; this
  // makes it clear the fullscreen view is playable, not just a bigger demo
  const tapToStart = document.getElementById('tapToStart');
  tapToStart.classList.add('show');
}

function dismissTapToStart() {
  const tapToStart = document.getElementById('tapToStart');
  tapToStart.classList.remove('show');
  const iframe = document.querySelector('#fullscreenFrameWrap iframe');
  if (!iframe || !iframe.contentWindow) return;

  // Primary path: call the game's own exitDemoIfActive() directly via
  // contentWindow. This is more reliable than postMessage for srcdoc
  // iframes, where some browsers (notably iOS Safari) can be inconsistent
  // about delivering cross-frame messages.
  try {
    if (typeof iframe.contentWindow.exitDemoIfActive === 'function') {
      iframe.contentWindow.exitDemoIfActive();
    } else {
      throw new Error('exitDemoIfActive not found on contentWindow');
    }
  } catch (err) {
    // Fallback: postMessage, in case direct access is blocked for any reason
    console.warn('direct call failed, falling back to postMessage', err);
    iframe.contentWindow.postMessage({ type: 'asobiva-start-play' }, '*');
  }
}
document.getElementById('tapToStart').addEventListener('click', dismissTapToStart);

function closeFullscreenGame() {
  const overlay = document.getElementById('fullscreenOverlay');
  const frameWrap = document.getElementById('fullscreenFrameWrap');
  overlay.classList.remove('open');
  frameWrap.innerHTML = '';
  document.getElementById('tapToStart').classList.remove('show');
}
document.getElementById('closeFullscreenBtn').addEventListener('click', closeFullscreenGame);

// ── Burger menu ───────────────────────────────
function toggleBurgerMenu() {
  document.getElementById('burgerMenu').classList.toggle('open');
}

function closeBurgerMenu() {
  document.getElementById('burgerMenu').classList.remove('open');
}

document.addEventListener('click', e => {
  const menu = document.getElementById('burgerMenu');
  const btn = document.getElementById('burgerBtn');
  if (menu && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
    menu.classList.remove('open');

});

function toggleAdmin() {
  adminMode = !adminMode;
  document.body.classList.toggle('admin-mode', adminMode);
  document.getElementById('adminBtn').classList.toggle('active', adminMode);

// ── Panel ─────────────────────────────────────
function openPanel() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}
function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  resetForm();
}
function resetForm() {
  pendingFiles = [];
  document.getElementById('fileInput').value = '';
  document.getElementById('linkUrl').value = '';
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('addBtn').disabled = true;
  document.getElementById('carouselToggleWrap').style.display = 'none';
  document.getElementById('carouselToggle').checked = false;
}

// ── File select ───────────────────────────────
function isHtmlFile(f) {
  return f.type === 'text/html' || f.name.toLowerCase().endsWith('.html') || f.name.toLowerCase().endsWith('.htm');
}
function onFileSelect(files) {
  for (const f of files) {
    if (isHtmlFile(f) || f.type.startsWith('image/')) pendingFiles.push(f);
  }
  renderPreviews();
}
function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const div = document.createElement('div');
    const del = document.createElement('button');
    del.className = 'p-del'; del.textContent = '✕';
    del.onclick = () => { pendingFiles.splice(i, 1); renderPreviews(); };

    if (isHtmlFile(f)) {
      div.className = 'p-thumb p-thumb-file';
      const name = document.createElement('span');
      name.className = 'p-thumb-name';
      name.textContent = f.name;
      div.appendChild(name);
    } else {
      div.className = 'p-thumb';
      const url = URL.createObjectURL(f);
      const img = document.createElement('img');
      img.src = url; img.alt = '';
      div.appendChild(img);
    }

    div.appendChild(del);
    grid.appendChild(div);
  });
  document.getElementById('addBtn').disabled = pendingFiles.length === 0;

  const imgCount = pendingFiles.filter(f => !isHtmlFile(f)).length;
  const htmlCount = pendingFiles.filter(isHtmlFile).length;
  const toggleWrap = document.getElementById('carouselToggleWrap');
  if (imgCount >= 2 && htmlCount === 0) {
    toggleWrap.style.display = 'flex';
  } else {
    toggleWrap.style.display = 'none';
    document.getElementById('carouselToggle').checked = false;
  }
}

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); onFileSelect(e.dataTransfer.files); });

// ── Add cards ─────────────────────────────────
async function addCards() {
  const link = document.getElementById('linkUrl').value.trim();
  const isCarousel = document.getElementById('carouselToggle').checked;
  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  btn.textContent = '保存中…';

  if (isCarousel) {
    const images = pendingFiles.filter(f => !isHtmlFile(f));
    const images64 = [];
    for (const f of images) images64.push(await fileToBase64(f));
    const id = await dbOp('cards', 'readwrite', s => s.add({ type: 'carousel', images: images64, link: '' }));
    cards.push({ id, type: 'carousel', images: images64, link: '' });
  } else {
    for (const f of pendingFiles) {
      if (isHtmlFile(f)) {
        const html = await fileToText(f);
        const name = f.name;
        if (isGameHtml(html)) {
          const id = await dbOp('cards', 'readwrite', s => s.add({ type: 'game', html, name, link: '' }));
          cards.push({ id, type: 'game', html, name, link: '' });
        } else {
          const id = await dbOp('cards', 'readwrite', s => s.add({ type: 'html', html, name, link }));
          cards.push({ id, type: 'html', html, name, link });
        }
      } else {
        const base64 = await fileToBase64(f);
        const id = await dbOp('cards', 'readwrite', s => s.add({ type: 'image', base64, link }));
        cards.push({ id, type: 'image', base64, link });
      }
    }
  }

  btn.textContent = '追加する';
  closePanel();
  render();
}

// ── Replace ───────────────────────────────────
async function replaceCard(id, file) {
  const existing = cards.find(c => c.id === id);
  const link = existing?.link || '';
  const i = cards.findIndex(c => c.id === id);

  if (isHtmlFile(file)) {
    const html = await fileToText(file);
    const name = file.name;
    if (isGameHtml(html)) {
      await dbOp('cards', 'readwrite', s => s.put({ id, type: 'game', html, name, link: '' }));
      if (i !== -1) cards[i] = { id, type: 'game', html, name, link: '' };
    } else {
      await dbOp('cards', 'readwrite', s => s.put({ id, type: 'html', html, name, link }));
      if (i !== -1) cards[i] = { id, type: 'html', html, name, link };
    }
  } else {
    const base64 = await fileToBase64(file);
    await dbOp('cards', 'readwrite', s => s.put({ id, type: 'image', base64, link }));
    if (i !== -1) cards[i] = { id, type: 'image', base64, link };
  }
  render();
}

// ── Delete ────────────────────────────────────
async function deleteCard(id) {
  await dbOp('cards', 'readwrite', s => s.delete(id));
  const i = cards.findIndex(c => c.id === id);
  if (i !== -1) cards.splice(i, 1);
  render();
}

// ── HTMLとして保存（静的スナップショット） ─────────
function downloadHTML() {

      } else if (c.type === 'image') {
        const tag = c.link

      }
    });
  }

  const staticCSS = `

window.addEventListener('message', function(e){
  if (e.data && e.data.type === 'asobiva-resize') {
    document.querySelectorAll('.html-card iframe').forEach(function(f){
      if (f.contentWindow === e.source) f.style.height = Math.max(60, e.data.height) + 'px';
    });
  }
});
function cyclerCarousel(el){
  var images = JSON.parse(el.dataset.images);
  var idx = (parseInt(el.dataset.index, 10) + 1) % images.length;
  el.dataset.index = String(idx);
  el.querySelector('img').src = images[idx];
  var dots = el.querySelectorAll('.carousel-dots span');
  dots.forEach(function(d, i){ d.classList.toggle('active', i === idx); });
  var count = el.querySelector('.carousel-count');
  if (count) count.textContent = (idx + 1) + ' / ' + images.length;
}
(function(){
  var CARD_ASPECT_W = 320;
  var CARD_ASPECT_H = 460;

  function sizeFrame(wrap, iframe){
    var w = wrap.clientWidth;
    if (!w) return;
    var h = Math.round(w * (CARD_ASPECT_H / CARD_ASPECT_W));
    iframe.style.width = w + 'px';
    iframe.style.height = h + 'px';
  }

  function fitGameFrames(){
    document.querySelectorAll('.game-card-frame-wrap').forEach(function(wrap){
      var iframe = wrap.querySelector('iframe');
      if (!iframe) return;
      sizeFrame(wrap, iframe);
    });
  }

  fitGameFrames();
  document.addEventListener('DOMContentLoaded', fitGameFrames);
  window.addEventListener('load', fitGameFrames);
  window.addEventListener('resize', fitGameFrames);
  // retry briefly in case layout wasn't ready on first pass
  setTimeout(fitGameFrames, 100);
  setTimeout(fitGameFrames, 400);
})();
function openFullscreenGameStatic(tapEl){
  var html = tapEl.getAttribute('data-html');
  var overlay = document.getElementById('fullscreenOverlay');
  var frameWrap = document.getElementById('fullscreenFrameWrap');
  frameWrap.innerHTML = '';
  var iframe = document.createElement('iframe');
  iframe.srcdoc = html;
  iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
  frameWrap.appendChild(iframe);
  overlay.classList.add('open');
  document.getElementById('tapToStart').classList.add('show');
}
document.getElementById('tapToStart').addEventListener('click', function(){
  document.getElementById('tapToStart').classList.remove('show');
  var iframe = document.querySelector('#fullscreenFrameWrap iframe');
  if (!iframe || !iframe.contentWindow) return;
  try {
    if (typeof iframe.contentWindow.exitDemoIfActive === 'function') {
      iframe.contentWindow.exitDemoIfActive();
    } else {
      throw new Error('exitDemoIfActive not found on contentWindow');
    }
  } catch (err) {
    iframe.contentWindow.postMessage({ type: 'asobiva-start-play' }, '*');
  }
});
document.getElementById('closeFullscreenBtn').addEventListener('click', function(){
  document.getElementById('fullscreenOverlay').classList.remove('open');
  document.getElementById('fullscreenFrameWrap').innerHTML = '';
  document.getElementById('tapToStart').classList.remove('show');
});
</scr` + `ipt>
