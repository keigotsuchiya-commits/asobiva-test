<body>
<p>この世界は、運ばれる水によって生きている。</p>
<p>荒野にはジャンクが積み上がり、人々は壊れたものを直しながら暮らしている。価値があるのは、水を運ぶ技術と道具。そして安全なルートの情報だ。</p>
<p>コンテナ団地C-23に暮らす少年ボルトは、相棒のナットと共に今日も走る。荷物を運び、地図を集め、仲間たちと助け合いながら。</p>
<p>だが旅の途中で、ボルトは気づき始める。</p>
<p>この世界には、説明のつかないことが多すぎる。</p>
<p>ジャンクと鉄道、仲間と冒険。</p>
<p>少年たちが辿り着く先で、世界の見え方は少しずつ変わっていく。</p>
</body>
