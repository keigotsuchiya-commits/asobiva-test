<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNSリンクカード生成ツール</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f3f3f3;
  color: #1a1a1a;
  padding: 20px;
}
.wrap { max-width: 480px; margin: 0 auto; }
h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 6px; }
.desc { font-size: 12px; color: #888; margin-bottom: 24px; line-height: 1.6; }

.sns-item {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.sns-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.sns-icon { width: 28px; height: 28px; flex-shrink: 0; }
.sns-name { font-size: 13px; font-weight: 600; }
.sns-toggle {
  margin-left: auto;
  width: 44px; height: 24px;
  background: #ccc;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.sns-toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.sns-toggle.on { background: #1a1a1a; }
.sns-toggle.on::after { transform: translateX(20px); }

.url-input {
  width: 100%;
  font-size: 13px;
  padding: 10px 12px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  outline: none;
  display: none;
}
.url-input.show { display: block; }
.url-input:focus { border-color: #1a1a1a; }

/* プレビュー */
.preview-wrap {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  text-align: center;
}
.preview-title { font-size: 11px; color: #888; letter-spacing: 0.08em; margin-bottom: 16px; }
.preview-icons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.preview-icon svg { width: 28px; height: 28px; }

/* サイズ設定 */
.size-row {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.size-label { font-size: 12px; color: #888; margin-bottom: 10px; }
.size-btns { display: flex; gap: 8px; }
.size-btn {
  flex: 1;
  padding: 8px;
  background: #f3f3f3;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
}
.size-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

.generate-btn {
  width: 100%;
  padding: 16px;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.06em;
  cursor: pointer;
}
.generate-btn:hover { background: #333; }
</style>
</head>
<body>
<div class="wrap">
  <h1>SNSリンクカード生成</h1>
  <p class="desc">使用するSNSをONにしてURLを入力し、HTMLファイルを生成してください。</p>

  <!-- X -->
  <div class="sns-item">
    <div class="sns-header">
      <svg class="sns-icon" viewBox="0 0 24 24" fill="none"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="#000"/></svg>
      <span class="sns-name">X（旧Twitter）</span>
      <button class="sns-toggle" id="toggle-x" onclick="toggleSNS('x')"></button>
    </div>
    <input class="url-input" id="url-x" type="url" placeholder="https://x.com/yourname">
  </div>

  <!-- Instagram -->
  <div class="sns-item">
    <div class="sns-header">
      <svg class="sns-icon" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5.5" stroke="#000" stroke-width="1.8"/><circle cx="12" cy="12" r="4.5" stroke="#000" stroke-width="1.8"/><circle cx="17.5" cy="6.5" r="1" fill="#000"/></svg>
      <span class="sns-name">Instagram</span>
      <button class="sns-toggle" id="toggle-instagram" onclick="toggleSNS('instagram')"></button>
    </div>
    <input class="url-input" id="url-instagram" type="url" placeholder="https://instagram.com/yourname">
  </div>

  <!-- note -->
  <div class="sns-item">
    <div class="sns-header">
      <svg class="sns-icon" viewBox="0 0 24 24" fill="none"><path d="M4 4h16v2H4V4zm0 4h10v2H4V8zm0 4h16v2H4v-2zm0 4h10v2H4v-2z" fill="#000"/></svg>
      <span class="sns-name">note</span>
      <button class="sns-toggle" id="toggle-note" onclick="toggleSNS('note')"></button>
    </div>
    <input class="url-input" id="url-note" type="url" placeholder="https://note.com/yourname">
  </div>

  <!-- YouTube -->
  <div class="sns-item">
    <div class="sns-header">
      <svg class="sns-icon" viewBox="0 0 24 24" fill="none"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29.94 29.94 0 0 0 1 12a29.94 29.94 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29.94 29.94 0 0 0 23 12a29.94 29.94 0 0 0-.46-5.58z" stroke="#000" stroke-width="1.8"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#000"/></svg>
      <span class="sns-name">YouTube</span>
      <button class="sns-toggle" id="toggle-youtube" onclick="toggleSNS('youtube')"></button>
    </div>
    <input class="url-input" id="url-youtube" type="url" placeholder="https://youtube.com/@yourname">
  </div>

  <!-- BOOTH -->
  <div class="sns-item">
    <div class="sns-header">
      <svg class="sns-icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="14" rx="2" stroke="#000" stroke-width="1.8"/><path d="M8 6V4a4 4 0 0 1 8 0v2" stroke="#000" stroke-width="1.8"/><path d="M3 11h18" stroke="#000" stroke-width="1.8"/></svg>
      <span class="sns-name">BOOTH</span>
      <button class="sns-toggle" id="toggle-booth" onclick="toggleSNS('booth')"></button>
    </div>
    <input class="url-input" id="url-booth" type="url" placeholder="https://yourname.booth.pm">
  </div>

  <!-- サイズ -->
  <div class="size-row">
    <div class="size-label">アイコンサイズ</div>
    <div class="size-btns">
      <button class="size-btn" onclick="setSize('small')">小（24px）</button>
      <button class="size-btn active" onclick="setSize('medium')">中（32px）</button>
      <button class="size-btn" onclick="setSize('large')">大（40px）</button>
    </div>
  </div>

  <!-- プレビュー -->
  <div class="preview-wrap">
    <div class="preview-title">PREVIEW</div>
    <div class="preview-icons" id="previewIcons">
      <span style="font-size:12px;color:#ccc;">ONにしたSNSがここに表示されます</span>
    </div>
  </div>

  <button class="generate-btn" onclick="generate()">HTMLファイルを生成</button>
</div>

<script>
const SNS = {
  x: {
    label: 'X',
    svg: `<svg viewBox="0 0 24 24" fill="none"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="#000"/></svg>`
  },
  instagram: {
    label: 'Instagram',
    svg: `<svg viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5.5" stroke="#000" stroke-width="1.8"/><circle cx="12" cy="12" r="4.5" stroke="#000" stroke-width="1.8"/><circle cx="17.5" cy="6.5" r="1" fill="#000"/></svg>`
  },
  note: {
    label: 'note',
    svg: `<svg viewBox="0 0 24 24" fill="none"><path d="M4 4h16v2H4V4zm0 4h10v2H4V8zm0 4h16v2H4v-2zm0 4h10v2H4v-2z" fill="#000"/></svg>`
  },
  youtube: {
    label: 'YouTube',
    svg: `<svg viewBox="0 0 24 24" fill="none"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29.94 29.94 0 0 0 1 12a29.94 29.94 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29.94 29.94 0 0 0 23 12a29.94 29.94 0 0 0-.46-5.58z" stroke="#000" stroke-width="1.8"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#000"/></svg>`
  },
  booth: {
    label: 'BOOTH',
    svg: `<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="14" rx="2" stroke="#000" stroke-width="1.8"/><path d="M8 6V4a4 4 0 0 1 8 0v2" stroke="#000" stroke-width="1.8"/><path d="M3 11h18" stroke="#000" stroke-width="1.8"/></svg>`
  }
};

const state = { x: false, instagram: false, note: false, youtube: false, booth: false };
let iconSize = 32;

function toggleSNS(id) {
  state[id] = !state[id];
  const btn = document.getElementById('toggle-' + id);
  const input = document.getElementById('url-' + id);
  btn.classList.toggle('on', state[id]);
  input.classList.toggle('show', state[id]);
  updatePreview();
}

function setSize(s) {
  const sizes = { small: 24, medium: 32, large: 40 };
  iconSize = sizes[s];
  document.querySelectorAll('.size-btn').forEach((b, i) => {
    b.classList.toggle('active', b.textContent.startsWith(s === 'small' ? '小' : s === 'medium' ? '中' : '大'));
  });
  updatePreview();
}

function updatePreview() {
  const container = document.getElementById('previewIcons');
  const active = Object.keys(state).filter(k => state[k]);
  if (active.length === 0) {
    container.innerHTML = '<span style="font-size:12px;color:#ccc;">ONにしたSNSがここに表示されます</span>';
    return;
  }
  container.innerHTML = active.map(k =>
    `<div style="width:${iconSize}px;height:${iconSize}px;">${SNS[k].svg}</div>`
  ).join('');
}

function generate() {
  const active = Object.keys(state).filter(k => state[k]);
  if (active.length === 0) {
    alert('SNSを1つ以上ONにしてください');
    return;
  }

  const links = active.map(k => {
    const url = document.getElementById('url-' + k).value.trim() || '#';
    return `<a href="${url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;justify-content:center;width:${iconSize}px;height:${iconSize}px;text-decoration:none;">${SNS[k].svg}</a>`;
  }).join('');

  const html = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html, body { margin: 0; padding: 0; background: #fff; }
.sns-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: ${Math.round(iconSize * 0.75)}px;
  padding: ${Math.round(iconSize * 0.5)}px 0;
}
svg { width: 100%; height: 100%; display: block; }
a:hover { opacity: 0.6; }
</style>
</head>
<body>
<div class="sns-row">
${links}
</div>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sns_card.html';
  document.body.appendChild(a);
  a.click();
  a.remove();
}
</script>
</body>
</html>
