なくなった時に価値に気付く。</div>
  <div class="card-evidences">
    <div class="card-evidence">2024年、日本のパン店の倒産件数は過去最多を更新した。</div>
    <div class="card-evidence">原材料費や光熱費の高騰が背景にあるが、閉店を惜しむ声の中には「一度も入ったことはなかった」「いつでも行けると思っていた」というものも少なくなかった。</div>
    <div class="card-evidence">人は毎日利用しているものだけでなく、「そこにある」という安心感そのものを失うことで価値に気付くことがある。</div>
