<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朧木周吾郎 記事ジェネレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    background: #1a1a1a;
    color: #e8e4dc;
    min-height: 100vh;
  }

  h1.app-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #666;
    text-transform: uppercase;
    padding: 16px 16px 12px;
  }

  .editor {
    display: flex;
    flex-direction: column;
    width: 100%;
  }

  .editor-section {
    background: #252525;
    border-bottom: 1px solid #2e2e2e;
    padding: 14px 16px;
    width: 100%;
  }

  .editor-section label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #777;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .editor-section input[type="text"],
  .editor-section textarea {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    color: #e8e4dc;
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    font-size: 15px;
    padding: 10px 12px;
    resize: vertical;
    line-height: 1.7;
    outline: none;
    -webkit-appearance: none;
  }

  .editor-section input[type="text"]:focus,
  .editor-section textarea:focus { border-color: #666; }

  /* ヘッダー画像アップロード */
  .image-upload-area {
    border: 2px dashed #3a3a3a;
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  .image-upload-area .placeholder { font-size: 13px; color: #666; }

  .image-upload-area img {
    max-width: 100%;
    max-height: 140px;
    object-fit: cover;
    border-radius: 4px;
    display: none;
  }

  /* アバター */
  .avatar-upload-area { display: flex; align-items: center; gap: 14px; }

  .avatar-circle-wrap {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px dashed #3a3a3a;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-circle-wrap input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  .avatar-circle-wrap img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 50%; }
  .avatar-icon { font-size: 18px; color: #555; }
  .avatar-hint { font-size: 12px; color: #666; }

  /* 本文ブロック */
  .blocks-container { display: flex; flex-direction: column; gap: 10px; }

  .block-row { display: flex; gap: 8px; align-items: flex-start; }

  .block-type-select {
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    color: #aaa;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 12px;
    padding: 8px 4px;
    cursor: pointer;
    flex-shrink: 0;
    outline: none;
    width: 64px;
    -webkit-appearance: none;
    text-align: center;
  }

  .block-textarea {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    color: #e8e4dc;
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    font-size: 15px;
    padding: 8px 10px;
    resize: vertical;
    line-height: 1.7;
    outline: none;
    min-height: 72px;
    -webkit-appearance: none;
  }

  .block-textarea:focus { border-color: #666; }

  .block-del-btn {
    background: none;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    color: #666;
    cursor: pointer;
    padding: 6px 10px;
    font-size: 16px;
    flex-shrink: 0;
    line-height: 1;
    -webkit-appearance: none;
  }

  .add-block-btn {
    background: none;
    border: 1px dashed #3a3a3a;
    border-radius: 4px;
    color: #666;
    cursor: pointer;
    font-size: 13px;
    padding: 10px;
    width: 100%;
    margin-top: 8px;
    -webkit-appearance: none;
  }

  /* ボタン */
  .action-btns {
    display: flex;
    gap: 0;
    width: 100%;
  }

  .btn-generate {
    flex: 1;
    background: #e0dcd4;
    border: none;
    border-right: 1px solid #ccc;
    border-radius: 0;
    color: #1a1a1a;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0.08em;
    padding: 18px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .btn-copy {
    flex: 1;
    background: #2a2a2a;
    border: none;
    border-radius: 0;
    color: #aaa;
    font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 14px;
    padding: 18px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  /* プレビュー */
  .preview-section { width: 100%; }

  .preview-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #555;
    text-transform: uppercase;
    padding: 12px 16px 8px;
  }

  #preview {
    background: #ffffff;
    width: 100%;
    color: #333;
  }

  /* PC layout */
  @media (min-width: 768px) {
    body { display: flex; flex-direction: column; }

    h1.app-title { padding: 24px 24px 16px; }

    .main-layout {
      display: flex;
      align-items: flex-start;
      flex: 1;
    }

    .editor {
      flex: 1;
      min-width: 0;
      border-right: 1px solid #2e2e2e;
    }

    .editor-section { padding: 16px 24px; }

    .preview-section {
      flex: 1.1;
      min-width: 0;
      position: sticky;
      top: 0;
      max-height: 100vh;
      overflow-y: auto;
    }

    .preview-label { padding: 16px 24px 8px; }

    #preview {
      max-height: calc(100vh - 60px);
      overflow-y: auto;
    }

    #preview::-webkit-scrollbar { width: 4px; }
    #preview::-webkit-scrollbar-track { background: #f5f5f5; }
    #preview::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

    .action-btns { border-top: 1px solid #2e2e2e; }
  }
</style>
</head>
<body>

<h1 class="app-title">朧木周吾郎 ／ Article Generator</h1>

<div class="main-layout">

  <div class="editor">

    <div class="editor-section">
      <label>ヘッダー画像</label>
      <div class="image-upload-area" id="uploadArea">
        <input type="file" accept="image/*" id="headerImageInput">
        <span class="placeholder">タップして画像を選択</span>
        <img id="uploadPreviewThumb" alt="">
      </div>
    </div>

    <div class="editor-section">
      <label>著者アイコン</label>
      <div class="avatar-upload-area">
        <div class="avatar-circle-wrap">
          <input type="file" accept="image/*" id="avatarImageInput">
          <span class="avatar-icon">＋</span>
          <img id="avatarPreviewThumb" alt="">
        </div>
        <span class="avatar-hint">円形にトリミングされます</span>
      </div>
    </div>

    <div class="editor-section">
      <label>タイトル</label>
      <input type="text" id="articleTitle" placeholder="名を持たぬ哲学者｜第一回：沈黙の塔">
    </div>

    <div class="editor-section">
      <label>本文</label>
      <div class="blocks-container" id="blocksContainer"></div>
      <button class="add-block-btn" id="addBlockBtn">＋ 段落を追加</button>
    </div>

    <div class="editor-section">
      <label>次回予告（省略可）</label>
      <input type="text" id="nextTitle" placeholder="「白紙の書棚」——声を持たない記憶と、読まれなかった書物について。">
    </div>

    <div class="action-btns">
      <button class="btn-generate" id="generateBtn">プレビュー更新</button>
      <button class="btn-copy" id="copyBtn">HTMLコピー</button>
    </div>

  </div>

  <div class="preview-section">
    <div class="preview-label">Preview</div>
    <div id="preview"><div id="previewContent"></div></div>
  </div>

</div>

<script>
  let headerImageDataURL = null;
  let avatarImageDataURL = null;
  let blocks = [
    { type: 'text', content: 'その哲学者の名を、私は知らない。' },
    { type: 'text', content: '誰の記録にも残っていなかった。書物にも、口伝にも。ただ、いくつかの痕跡だけがある。ある石板。誰にも読まれなかった本。崩れかけた、塔。' },
  ];

  document.getElementById('headerImageInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      headerImageDataURL = ev.target.result;
      const thumb = document.getElementById('uploadPreviewThumb');
      thumb.src = headerImageDataURL;
      thumb.style.display = 'block';
      document.querySelector('#uploadArea .placeholder').style.display = 'none';
      renderPreview();
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('avatarImageInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      avatarImageDataURL = ev.target.result;
      const thumb = document.getElementById('avatarPreviewThumb');
      thumb.src = avatarImageDataURL;
      thumb.style.display = 'block';
      document.querySelector('.avatar-icon').style.display = 'none';
      renderPreview();
    };
    reader.readAsDataURL(file);
  });

  function renderBlocks() {
    const container = document.getElementById('blocksContainer');
    container.innerHTML = '';
    blocks.forEach((block, i) => {
      const row = document.createElement('div');
      row.className = 'block-row';

      const sel = document.createElement('select');
      sel.className = 'block-type-select';
      sel.innerHTML = '<option value="text">本文</option><option value="bold">太字</option><option value="quote">引用</option>';
      sel.value = block.type;
      sel.addEventListener('change', () => { blocks[i].type = sel.value; renderPreview(); });

      const ta = document.createElement('textarea');
      ta.className = 'block-textarea';
      ta.value = block.content;
      ta.rows = 3;
      ta.addEventListener('input', () => { blocks[i].content = ta.value; renderPreview(); });

      const del = document.createElement('button');
      del.className = 'block-del-btn';
      del.textContent = '×';
      del.addEventListener('click', () => { blocks.splice(i, 1); renderBlocks(); renderPreview(); });

      row.appendChild(sel);
      row.appendChild(ta);
      row.appendChild(del);
      container.appendChild(row);
    });
  }

  document.getElementById('addBlockBtn').addEventListener('click', () => {
    blocks.push({ type: 'text', content: '' });
    renderBlocks();
  });

  const articleCSS = `
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif; background: #fff; color: #333; }
.p-header-img { width: 100%; aspect-ratio: 2 / 1; object-fit: cover; display: block; }
.p-body { padding: 24px 20px 56px; max-width: 680px; margin: 0 auto; }
.p-title { font-size: 17px; font-weight: bold; line-height: 1.6; color: #1a1a1a; margin-bottom: 16px; letter-spacing: 0.02em; }
.p-author { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
.p-author-avatar { width: 40px; height: 40px; border-radius: 50%; background: #bbb; flex-shrink: 0; overflow: hidden; }
.p-author-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.p-author-name { font-size: 13px; color: #333; font-weight: bold; line-height: 1.4; }
.p-author-date { font-size: 12px; color: #aaa; margin-top: 2px; }
.p-text-block { font-size: 15px; line-height: 2.0; color: #333; margin-bottom: 24px; letter-spacing: 0.02em; }
.p-bold-block { font-size: 15px; line-height: 2.0; color: #1a1a1a; margin-bottom: 24px; letter-spacing: 0.02em; font-weight: bold; }
.p-quote-block { background: #f7f7f7; border-radius: 4px; padding: 14px 18px; margin-bottom: 24px; font-size: 15px; line-height: 1.8; color: #1a1a1a; font-weight: bold; letter-spacing: 0.02em; }
.p-divider { border: none; border-top: 1px solid #e8e8e8; margin: 32px 0; }
.p-next { font-size: 14px; line-height: 1.8; color: #333; display: flex; gap: 6px; align-items: baseline; }
`;

  function buildArticleBody() {
    const title = document.getElementById('articleTitle').value || '（タイトル未入力）';
    const nextTitle = document.getElementById('nextTitle').value.trim();
    const now = new Date();
    const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    let html = '';
    if (headerImageDataURL) html += `<img class="p-header-img" src="${headerImageDataURL}" alt="">`;
    html += `<div class="p-body">`;
    html += `<h1 class="p-title">${esc(title)}</h1>`;
    const avatarInner = avatarImageDataURL ? `<img src="${avatarImageDataURL}" alt="">` : '';
    html += `<div class="p-author"><div class="p-author-avatar">${avatarInner}</div><div><div class="p-author-name">朧木 周吾郎 | SHUGORO OBOROGI</div><div class="p-author-date">${dateStr}</div></div></div>`;
    blocks.forEach(b => {
      if (!b.content.trim()) return;
      if (b.type === 'quote') html += `<div class="p-quote-block">${esc(b.content)}</div>`;
      else if (b.type === 'bold') html += `<p class="p-bold-block">${esc(b.content)}</p>`;
      else html += `<p class="p-text-block">${esc(b.content)}</p>`;
    });
    if (nextTitle) html += `<hr class="p-divider"><div class="p-next"><span>◆</span> 次回：${esc(nextTitle)}</div>`;
    html += `</div>`;
    return html;
  }

  function buildFullHTML() {
    const title = document.getElementById('articleTitle').value || '朧木周吾郎';
    return `<!DOCTYPE html>\n<html lang="ja">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>${esc(title)}</title>\n<style>${articleCSS}</style>\n</head>\n<body>\n${buildArticleBody()}\n</body>\n</html>`;
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderPreview() {
    document.getElementById('previewContent').innerHTML =
      `<style>${articleCSS}</style>` + buildArticleBody();
  }

  document.getElementById('copyBtn').addEventListener('click', () => {
    const html = buildFullHTML();
    const copy = () => {
      const ta = document.createElement('textarea');
      ta.value = html;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(html).catch(copy);
    } else {
      copy();
    }
    const btn = document.getElementById('copyBtn');
    btn.textContent = '完了 ✓';
    setTimeout(() => btn.textContent = 'HTMLコピー', 2000);
  });

  document.getElementById('generateBtn').addEventListener('click', renderPreview);
  ['articleTitle','nextTitle'].forEach(id => {
    document.getElementById(id).addEventListener('input', renderPreview);
  });

  renderBlocks();
  renderPreview();
</script>
</body>
</html>
