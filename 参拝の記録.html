<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参拝帖</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    background: #f3efe8;
    color: #2b2b2b;
    min-height: 100vh;
    padding: 0;
  }

  .banner {
    width: 100%;
    display: block;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .banner:active { transform: scale(0.98); }
  .banner img {
    width: 100%;
    display: block;
  }

  .content {
    display: none;
    padding: 22px 18px 40px;
    max-width: 480px;
    margin: 0 auto;
  }
  .content.show {
    display: block;
  }

  .stats-summary {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat-box {
    flex: 1;
    background: #fffdf8;
    border: 2px solid #d8c9a0;
    border-radius: 12px;
    padding: 16px 8px;
    text-align: center;
  }
  .stat-box .num {
    font-size: 28px;
    font-weight: 900;
    color: #b03a2e;
  }
  .stat-box .label {
    font-size: 11px;
    color: #777;
    margin-top: 4px;
  }

  .section-title {
    font-size: 13px;
    color: #777;
    margin: 22px 0 8px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .visit-table {
    background: #fffdf8;
    border: 2px solid #d8c9a0;
    border-radius: 12px;
    overflow: hidden;
  }
  .visit-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 16px;
    border-bottom: 1px dashed #d8c9a0;
    font-size: 14px;
  }
  .visit-row:last-child { border-bottom: none; }
  .visit-row .name {
    color: #333;
    font-weight: 700;
  }
  .visit-row .count {
    color: #b03a2e;
    font-weight: 900;
  }

  .history-list {
    background: #fffdf8;
    border: 2px solid #d8c9a0;
    border-radius: 12px;
    overflow: hidden;
  }
  .history-item {
    font-size: 13px;
    color: #555;
    padding: 12px 16px;
    border-bottom: 1px dashed #e5dcc5;
    display: flex;
    justify-content: space-between;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item .h-date {
    color: #999;
    flex-shrink: 0;
    margin-right: 10px;
  }
  .history-item .h-name {
    font-weight: 700;
    color: #333;
  }
  .history-item .h-result {
    color: #b03a2e;
    margin-left: auto;
    padding-left: 8px;
  }

  .empty-msg {
    text-align: center;
    color: #999;
    font-size: 13px;
    padding: 18px;
  }
</style>
</head>

  <div class="content" id="contentArea">
    <div class="stats-summary">
      <div class="stat-box">
        <div class="num" id="totalVisits">0</div>
        <div class="label">参拝回数</div>
      </div>
      <div class="stat-box">
        <div class="num" id="totalEma">0</div>
        <div class="label">奉納した絵馬</div>
      </div>
      <div class="stat-box">
        <div class="num" id="totalAchieved">0</div>
        <div class="label">叶った願い</div>
      </div>
    </div>

    <div class="section-title">お社ごとの参拝回数</div>
    <div class="visit-table" id="visitTable"></div>

    <div class="section-title">最近の参拝</div>
    <div class="history-list" id="historyList"></div>
  </div>

<script>
  const EMA_KEY = "asobiva_emas";
  const VISIT_KEY = "asobiva_visit_log";

  function loadEmas() {
    try {
      const raw = localStorage.getItem(EMA_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }
  function loadVisits() {
    try {
      const raw = localStorage.getItem(VISIT_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function openContent() {
    document.getElementById('bannerBtn').style.display = 'none';
    document.getElementById('contentArea').classList.add('show');
    renderStats();
  }

  function renderStats() {
    const visits = loadVisits();
    const emas = loadEmas();

    document.getElementById('totalVisits').textContent = visits.length;
    document.getElementById('totalEma').textContent = emas.length;
    document.getElementById('totalAchieved').textContent = emas.filter(e => e.achieved).length;

    const counts = {};
    visits.forEach(v => {
      counts[v.omikuji] = (counts[v.omikuji] || 0) + 1;
    });

    const tableEl = document.getElementById('visitTable');
    const names = Object.keys(counts);
    if (names.length === 0) {
      tableEl.innerHTML = '<div class="empty-msg">まだ参拝記録がありません</div>';
    } else {
      tableEl.innerHTML = names
        .sort((a, b) => counts[b] - counts[a])
        .map(name => `
          <div class="visit-row">
            <span class="name">${escapeHtml(name)}</span>
            <span class="count">${counts[name]}回</span>
          </div>
        `).join('');
    }

    const historyEl = document.getElementById('historyList');
    const recent = visits.slice(-10).reverse();
    if (recent.length === 0) {
      historyEl.innerHTML = '<div class="empty-msg">記録なし</div>';
    } else {
      historyEl.innerHTML = recent.map(v => `
        <div class="history-item">
          <span class="h-date">${formatDate(v.date)}</span>
          <span class="h-name">${escapeHtml(v.omikuji)}</span>
          ${v.result ? `<span class="h-result">${escapeHtml(v.result)}</span>` : ''}
        </div>
      `).join('');
    }
  }

</script>
