<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DOT BREAKER</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    height: 100%;
    background: #0a0a12;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  #wrap {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    align-items: center;
    justify-content: center;
    background: #0a0a12;
  }

  #hud {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    color: #39ff7a;
    font-size: 18px;
    letter-spacing: 2px;
    text-shadow: 0 0 8px #39ff7a;
    flex-shrink: 0;
  }

  #hud .lives {
    color: #ff3366;
    text-shadow: 0 0 8px #ff3366;
  }

  canvas {
    background: #0a0a12;
    display: block;
    image-rendering: pixelated;
    border-top: 2px solid #1f2a3a;
    border-bottom: 2px solid #1f2a3a;
    max-width: 100%;
  }

  #controls {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    flex-shrink: 0;
    gap: 14px;
  }

  .btn {
    width: 78px;
    height: 78px;
    border-radius: 14px;
    border: 2px solid #39ff7a;
    background: rgba(57,255,122,0.08);
    color: #39ff7a;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.05s, transform 0.05s;
  }

  .btn:active, .btn.active {
    background: #39ff7a;
    color: #0a0a12;
    transform: scale(0.95);
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,10,18,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #39ff7a;
    text-align: center;
    z-index: 10;
    padding: 20px;
  }

  #overlay h1 {
    font-size: 38px;
    letter-spacing: 5px;
    text-shadow: 0 0 16px #39ff7a;
    margin-bottom: 8px;
  }

  #overlay .sub {
    color: #6fa8ff;
    font-size: 14px;
    letter-spacing: 3px;
    margin-bottom: 28px;
  }

  #overlay .msg {
    font-size: 24px;
    margin-bottom: 8px;
    letter-spacing: 3px;
  }

  #overlay .score {
    color: #ffd23f;
    font-size: 18px;
    margin-bottom: 28px;
    letter-spacing: 2px;
  }

  #startBtn {
    border: 2px solid #39ff7a;
    color: #39ff7a;
    background: transparent;
    padding: 14px 40px;
    font-size: 18px;
    letter-spacing: 4px;
    font-family: inherit;
    border-radius: 6px;
  }

  #startBtn:active {
    background: #39ff7a;
    color: #0a0a12;
  }

  .hidden { display: none !important; }

  #demoStrip {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 4px 0 14px;
    flex-shrink: 0;
  }

  #demoBadge {
    color: #ffd23f;
    font-size: 13px;
    letter-spacing: 3px;
    text-shadow: 0 0 8px #ffd23f;
    border: 1px solid #ffd23f;
    padding: 5px 14px;
    border-radius: 4px;
    background: rgba(10,10,18,0.75);
    animation: blink 1.4s infinite;
  }

  #tapHint {
    color: #6fa8ff;
    font-size: 12px;
    letter-spacing: 2px;
    text-shadow: 0 0 6px #6fa8ff;
    animation: blink 1.4s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>SCORE <span id="scoreVal">0000</span></span>
    <span class="lives">LIFE <span id="livesVal">●●●</span></span>
  </div>

  <canvas id="game" width="320" height="400"></canvas>

  <div id="controls">
    <div class="btn" id="leftBtn">◀</div>
    <div class="btn" id="rightBtn">▶</div>
  </div>

  <div id="demoStrip" class="hidden">
    <div id="demoBadge">DEMO PLAY</div>
    <div id="tapHint">TAP CONTROLS TO PLAY</div>
  </div>
</div>

<div id="overlay" class="hidden">
  <h1>DOT BREAKER</h1>
  <div class="sub">PROTOTYPE v0.1</div>
  <div class="msg" id="overlayMsg">TAP TO PLAY</div>
  <div class="score hidden" id="finalScore"></div>
  <button id="startBtn">START</button>
</div>

<script>
window.ASOBIVA_GAME = true;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

// --- Game state ---
let score = 0;
let lives = 3;
let gameRunning = false;
let demoMode = true; // true = AI auto-play, false = human controlled

// Paddle
const paddle = {
  w: 56,
  h: 10,
  x: W/2 - 28,
  y: H - 24,
  speed: 5,
  movingLeft: false,
  movingRight: false
};

// Ball
const BALL_R = 5;
let ball = {
  x: W/2,
  y: H - 40,
  vx: 2.4,
  vy: -3.2
};

// Bricks
let bricks = [];
const BRICK_ROWS = 5;
const BRICK_COLS = 8;
const BRICK_W = 32;
const BRICK_H = 12;
const BRICK_GAP = 4;
const BRICK_START_Y = 36;
const BRICK_START_X = (W - (BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP)) / 2;

const ROW_COLORS = ['#ff3366', '#ffd23f', '#6fa8ff', '#39ff7a', '#c77dff'];

let frame = 0;

function initBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_START_X + c * (BRICK_W + BRICK_GAP),
        y: BRICK_START_Y + r * (BRICK_H + BRICK_GAP),
        w: BRICK_W,
        h: BRICK_H,
        alive: true,
        color: ROW_COLORS[r % ROW_COLORS.length]
      });
    }
  }
}

function resetBall() {
  ball.x = W/2;
  ball.y = H - 40;
  const dir = Math.random() < 0.5 ? -1 : 1;
  ball.vx = 2.4 * dir;
  ball.vy = -3.2;
}

function resetGame() {
  score = 0;
  lives = 3;
  paddle.x = W/2 - paddle.w/2;
  initBricks();
  resetBall();
  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = String(score).padStart(4, '0');
  document.getElementById('livesVal').textContent = '●'.repeat(Math.max(lives,0)) + '○'.repeat(Math.max(3-lives,0));
}

// --- Drawing ---
function drawPaddle() {
  ctx.fillStyle = '#39ff7a';
  ctx.shadowColor = '#39ff7a';
  ctx.shadowBlur = 6;
  ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
  ctx.shadowBlur = 0;
}

function drawBall() {
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBricks() {
  bricks.forEach(b => {
    if (!b.alive) return;
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 4;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
    // pixel notch detail
    ctx.fillStyle = 'rgba(10,10,18,0.4)';
    ctx.fillRect(b.x, b.y, b.w, 3);
  });
}

function drawStars() {
  ctx.fillStyle = '#1f2a3a';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 53) % W;
    const sy = (i * 97 + frame/3) % H;
    ctx.fillRect(sx, sy, 1, 1);
  }
}

// --- Demo AI ---
function aiControl() {
  paddle.movingLeft = false;
  paddle.movingRight = false;

  const paddleCenter = paddle.x + paddle.w / 2;
  // only react when ball is heading downward toward paddle, for natural movement
  const diff = ball.x - paddleCenter;

  if (Math.abs(diff) > 5) {
    if (diff < 0) paddle.movingLeft = true;
    else paddle.movingRight = true;
  }
}

// --- Logic ---
function update() {
  frame++;

  if (demoMode) aiControl();

  // paddle movement
  if (paddle.movingLeft) paddle.x -= paddle.speed;
  if (paddle.movingRight) paddle.x += paddle.speed;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

  // ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;

  // wall collisions
  if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.vx *= -1; }
  if (ball.x + BALL_R >= W) { ball.x = W - BALL_R; ball.vx *= -1; }
  if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy *= -1; }

  // paddle collision
  if (ball.y + BALL_R >= paddle.y &&
      ball.y + BALL_R <= paddle.y + paddle.h + 6 &&
      ball.x >= paddle.x &&
      ball.x <= paddle.x + paddle.w &&
      ball.vy > 0) {
    ball.y = paddle.y - BALL_R;
    ball.vy *= -1;
    // add angle based on hit position
    const hitPos = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2); // -1 to 1
    ball.vx = hitPos * 4;
    // slight speed up
    ball.vy *= 1.01;
  }

  // brick collisions
  bricks.forEach(b => {
    if (!b.alive) return;
    if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
        ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {
      b.alive = false;
      ball.vy *= -1;
      score += 50;
      updateHUD();
    }
  });

  // ball lost
  if (ball.y - BALL_R > H) {
    lives--;
    updateHUD();
    if (lives <= 0) {
      endGame(false);
    } else {
      resetBall();
    }
  }

  // win condition
  if (bricks.every(b => !b.alive)) {
    endGame(true);
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawStars();
  drawBricks();
  drawPaddle();
  drawBall();
}

function loop() {
  if (gameRunning) {
    update();
    render();
  }
  requestAnimationFrame(loop);
}

function endGame(won) {
  gameRunning = false;

  if (demoMode) {
    setTimeout(() => {
      if (demoMode) {
        resetGame();
        gameRunning = true;
      }
    }, 1200);
    return;
  }

  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlayMsg');
  const finalScore = document.getElementById('finalScore');
  msg.textContent = won ? 'YOU WIN!' : 'GAME OVER';
  msg.style.color = won ? '#39ff7a' : '#ff3366';
  finalScore.textContent = 'SCORE: ' + String(score).padStart(4,'0');
  finalScore.classList.remove('hidden');
  document.getElementById('startBtn').textContent = 'RETRY';
  overlay.classList.remove('hidden');
}

// --- Input handling ---
document.getElementById('startBtn').addEventListener('click', () => {
  demoMode = false;
  document.getElementById('demoStrip').classList.add('hidden');
  resetGame();
  document.getElementById('overlay').classList.add('hidden');
  gameRunning = true;
});

const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');

function bindHold(el, onStart, onEnd) {
  el.addEventListener('touchstart', e => { e.preventDefault(); onStart(); el.classList.add('active'); }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); onEnd(); el.classList.remove('active'); }, {passive:false});
  el.addEventListener('mousedown', () => { onStart(); el.classList.add('active'); });
  el.addEventListener('mouseup', () => { onEnd(); el.classList.remove('active'); });
  el.addEventListener('mouseleave', () => { onEnd(); el.classList.remove('active'); });
}

function exitDemoIfActive() {
  if (demoMode) {
    demoMode = false;
    document.getElementById('demoStrip').classList.add('hidden');
    resetGame();
    gameRunning = true;
  }
}

window.addEventListener('message', e => {
  if (e.data && e.data.type === 'asobiva-start-play') exitDemoIfActive();
});

bindHold(leftBtn, () => { exitDemoIfActive(); paddle.movingLeft = true; }, () => paddle.movingLeft = false);
bindHold(rightBtn, () => { exitDemoIfActive(); paddle.movingRight = true; }, () => paddle.movingRight = false);

// Keyboard support (for desktop testing)
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') paddle.movingLeft = true;
  if (e.key === 'ArrowRight') paddle.movingRight = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft') paddle.movingLeft = false;
  if (e.key === 'ArrowRight') paddle.movingRight = false;
});

// init
initBricks();
updateHUD();
resetGame();
gameRunning = true;
document.getElementById('demoStrip').classList.remove('hidden');
loop();
</script>
</body>
</html>
