<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASOBIVA — HTMLコンテンツ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #e0e0e0;
  --white: #ffffff;
  --ink: #1a1a1a;
  --ink-soft: #888;
  --border: #e0e0e0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

.wrap {
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  min-height: 100vh;
}

/* ── ADMIN BUTTON ── */
.admin-btn {
  position: fixed;
  top: 14px; right: 14px;
  z-index: 100;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  background: rgba(255,255,255,0.92);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  color: var(--ink-soft);
  backdrop-filter: blur(4px);
  transition: all 0.15s;
}
.admin-btn:hover { border-color: var(--ink); color: var(--ink); }
.admin-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

/* ── DOWNLOAD BUTTON ── */
.download-btn {
  position: fixed;
  top: 14px; right: 78px;
  z-index: 100;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  background: rgba(255,255,255,0.92);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  color: var(--ink-soft);
  backdrop-filter: blur(4px);
  transition: all 0.15s;
  display: none;
}
body.admin-mode .download-btn { display: inline-block; }
.download-btn:hover { border-color: var(--ink); color: var(--ink); }

/* ── HEADER PAIR ── */
.header-pair {
  display: flex;
  flex-direction: column;
  background: var(--white);
}

/* ── SITE HEADER (back + burger) ── */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.back-link {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
  text-decoration: none;
  transition: color 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.back-link:hover { color: var(--ink); }
.burger-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  align-items: flex-end;
}
.burger-btn span {
  display: block;
  height: 1.5px;
  background: var(--ink);
  border-radius: 1px;
  transition: width 0.15s;
}
.burger-btn span:nth-child(1) { width: 20px; }
.burger-btn span:nth-child(2) { width: 14px; }
.burger-btn span:nth-child(3) { width: 20px; }
.burger-btn:hover span { width: 20px; }

/* ── BURGER MENU DROPDOWN ── */
.burger-menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 12px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  overflow: hidden;
  z-index: 200;
  min-width: 120px;
}
.burger-menu.open { display: block; }
.burger-menu-item {
  display: block;
  width: 100%;
  padding: 14px 20px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  text-align: left;
  transition: background 0.15s;
}
.burger-menu-item:last-child { border-bottom: none; }
.burger-menu-item:hover { background: var(--bg); }
.burger-menu-item.active { color: var(--white); background: var(--ink); }

/* 管理モード以外では管理専用ボタンを非表示 */
.admin-only { display: none; }
body.admin-mode .admin-only { display: block; }

.burger-menu-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

/* ── NAV LINK items ── */
.nav-link-item {
  display: block;
  width: 100%;
  padding: 14px 20px;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  text-align: left;
  text-decoration: none;
  transition: background 0.15s;
}
.nav-link-item:hover { background: var(--bg); }

/* ── NAV EDITOR PANEL ── */
.nav-editor-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-radius: 16px 16px 0 0;
  padding: 28px 20px 48px;
  z-index: 300;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  max-width: 480px;
  margin: 0 auto;
  max-height: 80vh;
  overflow-y: auto;
}
.nav-editor-panel.open { transform: translateY(0); }

.nav-editor-list { margin-bottom: 16px; }
.nav-editor-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.nav-editor-row-label {
  flex: 1;
  font-size: 13px;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.nav-editor-row-url {
  font-size: 10px;
  color: var(--ink-soft);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 120px;
}
.nav-editor-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 11px;
  cursor: pointer;
  color: var(--ink-soft);
  white-space: nowrap;
}
.nav-editor-btn:hover { border-color: var(--ink); color: var(--ink); }
.nav-editor-btn.del { border-color: transparent; color: #c0392b; }
.nav-editor-btn.del:hover { background: #fdf0f0; }

.banner-slot {
  width: 100%;
  position: relative;
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 80px;
}
.banner-slot img {
  width: 100%;
  height: auto;
  display: block;
}
.slot-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: #ccc;
  user-select: none;
}

.banner-edit {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2;
}
.banner-edit span {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: #fff;
  background: rgba(0,0,0,0.45);
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.4);
  pointer-events: none;
}
body.admin-mode .banner-slot .banner-edit { display: flex; }
.banner-file { display: none; }

/* ── CARDS ── */
.card-section {
  background: var(--bg);
  padding-top: 10px;
}
.card-section.no-gap {
  background: var(--white);
  padding-top: 0;
}
.card-section.line-gap {
  background: var(--white);
  padding-top: 0;
  border-top: 1px solid var(--ink);
}
.card-gap-btn {
  display: none;
  position: absolute;
  bottom: 10px; left: 10px;
  height: 28px;
  padding: 0 10px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  z-index: 5;
  transition: background 0.15s;
  white-space: nowrap;
}
.card-gap-btn:hover { background: rgba(0,0,0,0.75); }
body.admin-mode .card-gap-btn { display: flex; }
.card {
  width: 100%;
  position: relative;
  display: block;
  text-decoration: none;
  background: var(--white);
  overflow: hidden;
}
.card img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.35s ease;
}
.card:hover img { transform: scale(1.015); }
body.admin-mode .card:hover img { transform: none; }

/* ── HTML CARD ── */
.html-card {
  width: 100%;
  position: relative;
  background: var(--white);
  overflow: hidden;
  padding: 10px 0;
}
.html-card iframe {
  display: block;
  width: 100%;
  height: 60px;
  border: none;
  background: var(--white);
}
.html-card-label {
  display: none;
  padding: 8px 16px;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  background: var(--white);
  border-bottom: 1px solid var(--border);
}

/* ── CAROUSEL CARD ── */
.carousel-card {
  width: 100%;
  position: relative;
  background: var(--white);
  overflow: hidden;
  cursor: pointer;
}
.carousel-card img {
  width: 100%;
  height: auto;
  display: block;
}
.carousel-dots {
  position: absolute;
  bottom: 10px;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 6px;
  pointer-events: none;
}
.carousel-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  transition: background 0.2s, transform 0.2s;
}
.carousel-dots span.active {
  background: #fff;
  transform: scale(1.25);
}
.carousel-count {
  position: absolute;
  top: 10px; right: 10px;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: #fff;
  background: rgba(0,0,0,0.45);
  padding: 3px 8px;
  border-radius: 20px;
  pointer-events: none;
}
body.admin-mode .html-card-label { display: block; }

.card-del {
  display: none;
  position: absolute;
  top: 10px; right: 10px;
  width: 30px; height: 30px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  z-index: 5;
  transition: background 0.15s;
}
.card-del:hover { background: #c0392b; }
body.admin-mode .card-del { display: flex; }

.card-replace {
  display: none;
  position: absolute;
  top: 10px; right: 50px;
  width: 30px; height: 30px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  z-index: 5;
  transition: background 0.15s;
}
.card-replace:hover { background: #1a6e3c; }
body.admin-mode .card-replace { display: flex; }

.card-replace-input { display: none; }

/* ── ADD BUTTON ── */
.add-section {
  background: var(--bg);
  padding-top: 10px;
}
.add-card-btn {
  display: flex;
  width: 100%;
  padding: 22px 16px;
  background: var(--white);
  border: none;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  transition: background 0.15s, color 0.15s;
}
.add-card-btn:hover { background: #f5f5f5; color: var(--ink); }

/* ── EMPTY STATE ── */
.empty-section {
  background: var(--bg);
  padding-top: 10px;
}
.empty-state {
  padding: 60px 24px;
  text-align: center;
  color: var(--ink-soft);
  font-size: 13px;
  line-height: 2;
  background: var(--white);
}
.empty-state strong {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}

/* ── FOOTER ── */
.footer-section {
  background: var(--bg);
  padding-top: 10px;
}
.footer-section.no-gap {
  padding-top: 0;
}
.footer-gap-btn {
  display: none;
  background: none;
  border: none;
  font-size: 10px;
  color: var(--ink-soft);
  cursor: pointer;
  text-decoration: underline;
  letter-spacing: 0.06em;
  margin-left: 8px;
}
body.admin-mode .footer-gap-btn { display: inline-block; }
footer {
  padding: 28px 16px;
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  background: var(--white);
}

/* ── PANEL ── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.28);
  z-index: 200;
  backdrop-filter: blur(2px);
}
.overlay.open { display: block; }

.panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-radius: 16px 16px 0 0;
  padding: 28px 20px 48px;
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  max-width: 480px;
  margin: 0 auto;
}
.panel.open { transform: translateY(0); }

.panel-handle {
  width: 36px; height: 4px;
  background: var(--border); border-radius: 2px;
  margin: 0 auto 22px;
}
.panel-title {
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.06em; margin-bottom: 18px; color: var(--ink);
}

.drop-zone {
  border: 2px dashed var(--border); border-radius: 10px;
  padding: 26px 16px; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 12px; background: #fafafa; position: relative;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--ink); background: #f0f0f0; }
.drop-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.dz-icon { font-size: 24px; margin-bottom: 6px; }
.dz-label { font-size: 12px; font-weight: 500; color: var(--ink); display: block; margin-bottom: 4px; }
.dz-hint { font-size: 11px; color: var(--ink-soft); }

.preview-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 6px; margin-bottom: 14px;
}
.p-thumb { aspect-ratio: 1; border-radius: 6px; overflow: hidden; position: relative; background: var(--border); }
.p-thumb img { width: 100%; height: 100%; object-fit: cover; }
.p-thumb-file {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  padding: 8px 22px 8px 8px;
  font-size: 9px;
  color: var(--ink);
  word-break: break-all;
  line-height: 1.4;
  background: #f0ede6;
}
.p-thumb-name { display: block; }
.p-del {
  position: absolute; top: 3px; right: 3px;
  width: 18px; height: 18px; background: rgba(0,0,0,0.5); color: #fff;
  border: none; border-radius: 50%; font-size: 9px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.field-label {
  font-size: 11px; font-weight: 400; color: var(--ink-soft);
  letter-spacing: 0.06em; margin-bottom: 6px; display: block;
}
.field-input {
  width: 100%; font-size: 14px; padding: 12px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  background: #fafafa; color: var(--ink); outline: none;
  transition: border-color 0.15s; margin-bottom: 16px;
}
.field-input:focus { border-color: var(--ink); }
.field-input::placeholder { color: var(--ink-soft); font-size: 13px; }

.carousel-toggle {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--ink);
  padding: 10px 4px; margin-bottom: 6px;
  cursor: pointer;
}
.carousel-toggle input { width: 16px; height: 16px; flex-shrink: 0; }

.btn-add {
  width: 100%; padding: 15px;
  background: var(--ink); color: var(--white);
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; letter-spacing: 0.06em;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-add:hover { opacity: 0.8; }
.btn-add:disabled { opacity: 0.28; cursor: default; }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; gap: 12px;
}
.loading-text {
  font-size: 11px; letter-spacing: 0.1em; color: #aaa;
}
.loading-bar-wrap {
  width: 120px; height: 3px;
  background: #e0e0e0; border-radius: 2px; overflow: hidden;
}
.loading-bar {
  height: 100%; width: 0%;
  background: var(--ink); border-radius: 2px;
  transition: width 0.3s ease;
}

@media (prefers-reduced-motion: reduce) {
  .card img, .panel { transition: none; }
}

/* ── FOOTER EDIT ── */
.footer-edit-btn {
  display: none;
  cursor: pointer;
  background: none;
  border: none;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  padding: 4px 8px;
  border-radius: 4px;
  text-decoration: underline;
}
body.admin-mode .footer-edit-btn { display: inline-block; }

/* ── FOOTER EDITOR PANEL ── */
.footer-editor-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-radius: 16px 16px 0 0;
  padding: 28px 20px 48px;
  z-index: 300;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  max-width: 480px;
  margin: 0 auto;
}
.footer-editor-panel.open { transform: translateY(0); }

/* ── MOVE BUTTONS ── */
.card-move {
  display: none;
  position: absolute;
  bottom: 10px; right: 50px;
  flex-direction: row;
  gap: 6px;
  z-index: 5;
}
.card-move button {
  width: 30px; height: 30px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.card-move button:hover { background: #444; }
.card-move button:disabled { opacity: 0.3; cursor: default; }
body.admin-mode .card-move { display: flex; }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-text">読み込み中…</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
</div>

<button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">管理</button>


<div class="wrap">
  <div class="site-header">
    <a href="asobiva.html" class="back-link">← トップへ戻る</a>
    <div style="position:relative;">
      <button class="burger-btn" id="burgerBtn" onclick="toggleBurgerMenu()">
        <span></span><span></span><span></span>
      </button>
      <div class="burger-menu" id="burgerMenu">
        <!-- ナビリンク一覧（動的に生成） -->
        <div id="navLinks"></div>
        <div class="burger-menu-divider"></div>
        <button class="burger-menu-item" id="adminBtn" onclick="toggleAdmin()">管理</button>
        <button class="burger-menu-item admin-only" onclick="openNavEditor(); closeBurgerMenu()">メニューを編集</button>
        <button class="burger-menu-item admin-only" onclick="downloadEditHTML(); closeBurgerMenu()">編集用保存</button>
        <button class="burger-menu-item admin-only" id="downloadHtmlBtn" onclick="handleDownloadClick()">公開用保存</button>
      </div>
    </div>
  </div>
  <div class="header-pair">
    <div class="banner-slot" id="banner1">
      <span class="slot-label">HEADER</span>
      <div class="banner-edit" onclick="triggerBanner(1)"><span>画像を設定</span></div>
      <input type="file" class="banner-file" id="bannerFile1" accept="image/*" onchange="onBannerFile(1,this)">
    </div>
  </div>

  <div id="cardContainer"></div>

  <div class="footer-section" id="footerSection">
    <footer>
      <span id="footerText">ASOBIVA — i.roiro</span>
      <button class="footer-edit-btn" onclick="openFooterEditor()">編集</button>
      <button class="footer-gap-btn" id="footerGapBtn" onclick="toggleFooterGap()">隙間あり</button>
    </footer>
  </div>
</div>


<!-- フッター編集パネル -->
<div class="overlay" id="footerEditorOverlay" onclick="closeFooterEditor()"></div>
<div class="footer-editor-panel" id="footerEditorPanel">
  <div class="panel-handle"></div>
  <div class="panel-title">フッターを編集</div>
  <label class="field-label">フッターテキスト</label>
  <input class="field-input" id="footerTextInput" type="text" placeholder="例: © 2025 i.roiro">
  <button class="btn-add" onclick="saveFooterText()">保存する</button>
</div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-title">カードを追加</div>
  <div style="font-size:10px;color:#aaa;margin-top:-12px;margin-bottom:16px;">公開用保存時に自動圧縮されます（v2）</div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*,text/html,.html" multiple onchange="onFileSelect(this.files)">
    <div class="dz-icon">📄🖼️</div>
    <span class="dz-label">画像 または HTMLファイルを選択 / ドロップ</span>
    <span class="dz-hint">JPG · PNG · GIF · WEBP · HTML　複数選択可</span>
  </div>
  <div class="preview-grid" id="previewGrid"></div>
  <label class="carousel-toggle" id="carouselToggleWrap" style="display:none;">
    <input type="checkbox" id="carouselToggle">
    <span>選んだ画像を1枚のカードにまとめる（カルーセル）</span>
  </label>
  <label class="field-label" for="linkUrl">リンク先URL（任意）</label>
  <input class="field-input" id="linkUrl" type="url" placeholder="https://note.com/...">
  <button class="btn-add" id="addBtn" onclick="addCards()" disabled>追加する</button>
</div>

<script>
// ── IndexedDB (Base64ストレージ) ──────────────
const DB_NAME = 'asobiva_content_asobiva_b64';
let db;

function openDB() {
  return new Promise((res) => {
    try {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('cards'))
          d.createObjectStore('cards', { keyPath: 'id', autoIncrement: true });
        if (!d.objectStoreNames.contains('banners'))
          d.createObjectStore('banners', { keyPath: 'slot' });
      };
      req.onsuccess = e => { db = e.target.result; res(); };
      req.onerror = () => { db = null; res(); };
    } catch (err) {
      db = null;
      res();
    }
  });
}

function dbOp(store, mode, fn) {
  if (!db) {
    // IndexedDB unavailable (e.g. sandboxed preview) — no-op storage
    return Promise.resolve(mode === 'readonly' && store === 'cards' ? [] : undefined);
  }
  return new Promise((res, rej) => {
    const req = fn(db.transaction(store, mode).objectStore(store));
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e);
  });
}

// ── ファイル → Base64 変換 ────────────────────
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result); // "data:image/jpeg;base64,..."
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

// ── ファイル → テキスト変換（HTML用） ──────────
function fileToText(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsText(file, 'UTF-8');
  });
}

// ── iframe高さ自動調整 ─────────────────────────
function injectAutoResize(html) {
  const script = `
<scr` + `ipt>
(function(){
  function reportHeight(){
    var h = document.documentElement.scrollHeight;
    parent.postMessage({ type: 'asobiva-resize', height: h }, '*');
  }
  window.addEventListener('message', function(e){
    if (e.data && e.data.type === 'asobiva-init') reportHeight();
  });
  window.addEventListener('load', reportHeight);
  if (document.readyState === 'complete') reportHeight();
  window.addEventListener('resize', reportHeight);
  if (window.ResizeObserver) {
    new ResizeObserver(reportHeight).observe(document.body);
  }
})();
</scr` + `ipt>`;
  if (/<\/body>/i.test(html)) {
    return html.replace(/<\/body>/i, script + '</body>');
  }
  return html + script;
}

// ── iframeリサイズメッセージ受信 ───────────────
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'asobiva-resize') {
    document.querySelectorAll('.html-card iframe').forEach(f => {
      if (f.contentWindow === e.source) {
        f.style.height = Math.max(60, e.data.height) + 'px';
      }
    });
  }
});

// ── State ─────────────────────────────────────
let cards = [];       // [{ id, type: 'image'|'html'|'carousel', html?, base64?, images?, name?, link }]
let banners = { 1: null }; // base64 strings
let pendingFiles = [];
let adminMode = false;

// ── Init ──────────────────────────────────────
async function init() {
  try {
    setLoadingBar(10);
    await openDB();
    setLoadingBar(30);

    // banner (single header)
    try {
      const row = await dbOp('banners', 'readonly', s => s.get(1));
      if (row?.base64) { banners[1] = row.base64; applyBanner(1, row.base64); }
    } catch {}
    setLoadingBar(60);

    // cards
    const rows = await dbOp('cards', 'readonly', s => s.getAll());
    cards = (rows || []).map(r => ({
      id: r.id,
      type: r.type || 'html',
      html: r.html,
      base64: r.base64,
      images: r.images,
      name: r.name || '',
      link: r.link || '',
      gap: r.gap !== undefined ? r.gap : true,
      order: (r.order ?? r.id)
    }));
    cards.sort((a, b) => a.order - b.order);
    setLoadingBar(100);
  } catch (err) {
    console.error('init error:', err);
  }

  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    render();
    renderNavLinks();
    loadFooterText();
    loadFooterGap();
  }, 200);
}

function setLoadingBar(pct) {
  document.getElementById('loadingBar').style.width = pct + '%';
}

// ── Banners ───────────────────────────────────
function triggerBanner(slot) {
  document.getElementById('bannerFile' + slot).click();
}

async function onBannerFile(slot, input) {
  const f = input.files[0];
  if (!f) return;
  const base64 = await fileToBase64(f);
  await dbOp('banners', 'readwrite', s => s.put({ slot, base64 }));
  banners[slot] = base64;
  applyBanner(slot, base64);
}

function applyBanner(slot, base64) {
  const el = document.getElementById('banner' + slot);
  el.querySelector('.slot-label')?.remove();
  el.querySelector('img')?.remove();
  const img = document.createElement('img');
  img.src = base64;
  img.alt = '';
  el.insertBefore(img, el.querySelector('.banner-edit'));
}

// ── Render ────────────────────────────────────
function render() {
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';

  if (cards.length === 0 && !adminMode) {
    const sec = document.createElement('div');
    sec.className = 'empty-section';
    sec.innerHTML = '<div class="empty-state"><strong>まだカードがありません</strong>右上の「管理」から追加できます</div>';
    container.appendChild(sec);
  }

  cards.forEach((c, idx) => {
    const sec = document.createElement('div');
    const gapClass = c.gap === false || c.gap === 'nogap' ? ' no-gap' : c.gap === 'line' ? ' line-gap' : '';
    sec.className = 'card-section' + gapClass;

    let wrap, replaceAccept, supportsReplace = true;

    if (c.type === 'image') {
      wrap = document.createElement('a');
      wrap.className = 'card';
      wrap.href = adminMode ? '#' : (c.link || '#');
      if (!adminMode && c.link) wrap.target = '_blank';
      wrap.rel = 'noopener';

      const img = document.createElement('img');
      img.src = c.base64;
      img.alt = '';
      img.loading = 'lazy';
      wrap.appendChild(img);
      replaceAccept = 'image/*,text/html,.html';
    } else if (c.type === 'carousel') {
      wrap = document.createElement('div');
      wrap.className = 'carousel-card';
      wrap.dataset.index = '0';

      const img = document.createElement('img');
      img.src = c.images[0];
      img.alt = '';
      img.loading = 'lazy';
      wrap.appendChild(img);

      if (c.images.length > 1) {
        const dots = document.createElement('div');
        dots.className = 'carousel-dots';
        c.images.forEach((_, i) => {
          const dot = document.createElement('span');
          if (i === 0) dot.classList.add('active');
          dots.appendChild(dot);
        });
        wrap.appendChild(dots);

        const count = document.createElement('div');
        count.className = 'carousel-count';
        count.textContent = `1 / ${c.images.length}`;
        wrap.appendChild(count);

        wrap.addEventListener('click', e => {
          if (adminMode) return; // avoid conflicting with admin controls
          e.preventDefault();
          let idx = (parseInt(wrap.dataset.index, 10) + 1) % c.images.length;
          wrap.dataset.index = String(idx);
          img.src = c.images[idx];
          dots.querySelectorAll('span').forEach((d, i) => d.classList.toggle('active', i === idx));
          count.textContent = `${idx + 1} / ${c.images.length}`;
        });
      }
      supportsReplace = false;
    } else {
      wrap = document.createElement('div');
      wrap.className = 'html-card';

      const label = document.createElement('div');
      label.className = 'html-card-label';
      label.textContent = c.name || '(無題)';

      const iframe = document.createElement('iframe');
      iframe.srcdoc = injectAutoResize(c.html);
      iframe.loading = 'lazy';
      iframe.scrolling = 'no';
      iframe.sandbox = 'allow-scripts allow-popups allow-forms allow-same-origin';
      iframe.addEventListener('load', function() {
        try {
          const h = iframe.contentDocument.documentElement.scrollHeight || iframe.contentDocument.body.scrollHeight;
          if (h > 0) iframe.style.height = h + 'px';
        } catch(e) {}
        iframe.contentWindow.postMessage({ type: 'asobiva-init' }, '*');
      });

      wrap.appendChild(label);
      wrap.appendChild(iframe);
      replaceAccept = 'image/*,text/html,.html';
    }

    let replaceBtn, replaceInput;
    if (supportsReplace) {
      replaceBtn = document.createElement('button');
      replaceBtn.className = 'card-replace';
      replaceBtn.title = '差し替え';
      replaceBtn.textContent = '⇄';

      replaceInput = document.createElement('input');
      replaceInput.type = 'file';
      replaceInput.accept = replaceAccept;
      replaceInput.className = 'card-replace-input';
      replaceInput.addEventListener('change', e => {
        e.preventDefault(); e.stopPropagation();
        const f = e.target.files[0];
        if (f) replaceCard(c.id, f);
      });

      replaceBtn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        replaceInput.click();
      });
    }

    const delBtn = document.createElement('button');
    delBtn.className = 'card-del';
    delBtn.title = '削除';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      deleteCard(c.id);
    });

    const gapBtn = document.createElement('button');
    gapBtn.className = 'card-gap-btn';
    const gapLabels = { true: '隙間あり', false: '隙間なし', nogap: '隙間なし', line: 'ライン' };
    gapBtn.textContent = gapLabels[c.gap] ?? '隙間あり';
    gapBtn.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      toggleGap(c.id);
    });
    const moveWrap = document.createElement('div');
    moveWrap.className = 'card-move';
    const upBtn = document.createElement('button');
    upBtn.textContent = '↑'; upBtn.title = '上へ移動';
    upBtn.disabled = idx === 0;
    upBtn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); moveCard(idx, idx - 1); });
    const downBtn = document.createElement('button');
    downBtn.textContent = '↓'; downBtn.title = '下へ移動';
    downBtn.disabled = idx === cards.length - 1;
    downBtn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); moveCard(idx, idx + 1); });
    moveWrap.appendChild(upBtn);
    moveWrap.appendChild(downBtn);

    if (supportsReplace) {
      wrap.appendChild(replaceBtn);
      wrap.appendChild(replaceInput);
    }
    wrap.appendChild(delBtn);
    wrap.appendChild(gapBtn);
    wrap.appendChild(moveWrap);
    sec.appendChild(wrap);
    container.appendChild(sec);
  });

  if (adminMode) {
    const addSec = document.createElement('div');
    addSec.className = 'add-section';
    const btn = document.createElement('button');
    btn.className = 'add-card-btn';
    btn.onclick = openPanel;
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> カードを追加`;
    addSec.appendChild(btn);
    container.appendChild(addSec);
  }
}

// ── Admin ─────────────────────────────────────
// ── Burger menu ───────────────────────────────
function toggleBurgerMenu() {
  document.getElementById('burgerMenu').classList.toggle('open');
}

function closeBurgerMenu() {
  document.getElementById('burgerMenu').classList.remove('open');
}

document.addEventListener('click', e => {
  const menu = document.getElementById('burgerMenu');
  const btn = document.getElementById('burgerBtn');
  if (menu && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.remove('open');
  }
});

// ── Nav Menu (localStorage共通) ───────────────
const NAV_KEY = 'asobiva_nav_v1';

function loadNavItems() {
  try { return JSON.parse(localStorage.getItem(NAV_KEY)) || []; }
  catch { return []; }
}

function saveNavItems(items) {
  localStorage.setItem(NAV_KEY, JSON.stringify(items));
}

function renderNavLinks() {
  const items = loadNavItems();
  const container = document.getElementById('navLinks');
  if (!container) return;
  container.innerHTML = '';
  items.forEach(item => {
    const a = document.createElement('a');
    a.className = 'nav-link-item';
    a.href = item.url;
    a.textContent = item.label;
    container.appendChild(a);
  });
}

function openNavEditor() {
  renderNavEditorList();
  document.getElementById('navEditorOverlay').classList.add('open');
  document.getElementById('navEditorPanel').classList.add('open');
}

function closeNavEditor() {
  document.getElementById('navEditorOverlay').classList.remove('open');
  document.getElementById('navEditorPanel').classList.remove('open');
  document.getElementById('navLabelInput').value = '';
  document.getElementById('navUrlInput').value = '';
}

function renderNavEditorList() {
  const items = loadNavItems();
  const list = document.getElementById('navEditorList');
  list.innerHTML = '';
  if (items.length === 0) {
    list.innerHTML = '<p style="font-size:12px;color:#999;padding:8px 0 16px;">まだ項目がありません</p>';
    return;
  }
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'nav-editor-row';
    row.innerHTML = `
      <div style="flex:1;overflow:hidden;">
        <div class="nav-editor-row-label">${item.label}</div>
        <div class="nav-editor-row-url">${item.url}</div>
      </div>
      <button class="nav-editor-btn" onclick="moveNavItem(${i},-1)">↑</button>
      <button class="nav-editor-btn" onclick="moveNavItem(${i},1)">↓</button>
      <button class="nav-editor-btn del" onclick="deleteNavItem(${i})">✕</button>
    `;
    list.appendChild(row);
  });
}

function addNavItem() {
  const label = document.getElementById('navLabelInput').value.trim();
  const url = document.getElementById('navUrlInput').value.trim();
  if (!label || !url) return;
  const items = loadNavItems();
  items.push({ label, url });
  saveNavItems(items);
  document.getElementById('navLabelInput').value = '';
  document.getElementById('navUrlInput').value = '';
  renderNavEditorList();
  renderNavLinks();
}

function deleteNavItem(i) {
  const items = loadNavItems();
  items.splice(i, 1);
  saveNavItems(items);
  renderNavEditorList();
  renderNavLinks();
}

function moveNavItem(i, dir) {
  const items = loadNavItems();
  const j = i + dir;
  if (j < 0 || j >= items.length) return;
  [items[i], items[j]] = [items[j], items[i]];
  saveNavItems(items);
  renderNavEditorList();
  renderNavLinks();
}


// ── Footer gap toggle ─────────────────────────
async function loadFooterGap() {
  try {
    const row = await dbOp('banners', 'readonly', s => s.get(98));
    const noGap = row?.footerNoGap === true;
    const sec = document.getElementById('footerSection');
    const btn = document.getElementById('footerGapBtn');
    if (sec) sec.classList.toggle('no-gap', noGap);
    if (btn) btn.textContent = noGap ? '隙間なし' : '隙間あり';
  } catch {}
}

async function toggleFooterGap() {
  const sec = document.getElementById('footerSection');
  const btn = document.getElementById('footerGapBtn');
  const noGap = !sec.classList.contains('no-gap');
  sec.classList.toggle('no-gap', noGap);
  btn.textContent = noGap ? '隙間なし' : '隙間あり';
  await dbOp('banners', 'readwrite', s => s.put({ slot: 98, footerNoGap: noGap }));
}

// ── Footer editor ─────────────────────────────
async function loadFooterText() {
  try {
    const row = await dbOp('banners', 'readonly', s => s.get(99));
    if (row?.footerText) {
      document.getElementById('footerText').textContent = row.footerText;
    }
  } catch {}
}

function openFooterEditor() {
  const current = document.getElementById('footerText').textContent;
  document.getElementById('footerTextInput').value = current;
  document.getElementById('footerEditorOverlay').classList.add('open');
  document.getElementById('footerEditorPanel').classList.add('open');
}

function closeFooterEditor() {
  document.getElementById('footerEditorOverlay').classList.remove('open');
  document.getElementById('footerEditorPanel').classList.remove('open');
}

async function saveFooterText() {
  const text = document.getElementById('footerTextInput').value.trim();
  if (!text) return;
  await dbOp('banners', 'readwrite', s => s.put({ slot: 99, footerText: text }));
  document.getElementById('footerText').textContent = text;
  closeFooterEditor();
}

function toggleAdmin() {
  adminMode = !adminMode;
  document.body.classList.toggle('admin-mode', adminMode);
  document.getElementById('adminBtn').classList.toggle('active', adminMode);
  closeBurgerMenu();
  if (!adminMode) closePanel();
  render();
}

// ── Panel ─────────────────────────────────────
function openPanel() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  resetForm();
}

function resetForm() {
  pendingFiles = [];
  document.getElementById('fileInput').value = '';
  document.getElementById('linkUrl').value = '';
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('addBtn').disabled = true;
  document.getElementById('carouselToggleWrap').style.display = 'none';
  document.getElementById('carouselToggle').checked = false;
}

// ── File select ───────────────────────────────
function isHtmlFile(f) {
  return f.type === 'text/html' || f.name.toLowerCase().endsWith('.html') || f.name.toLowerCase().endsWith('.htm');
}

function onFileSelect(files) {
  for (const f of files) {
    if (isHtmlFile(f) || f.type.startsWith('image/')) pendingFiles.push(f);
  }
  renderPreviews();
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const div = document.createElement('div');
    const del = document.createElement('button');
    del.className = 'p-del'; del.textContent = '✕';
    del.onclick = () => { pendingFiles.splice(i, 1); renderPreviews(); };

    if (isHtmlFile(f)) {
      div.className = 'p-thumb p-thumb-file';
      const name = document.createElement('span');
      name.className = 'p-thumb-name';
      name.textContent = f.name;
      div.appendChild(name);
    } else {
      div.className = 'p-thumb';
      const url = URL.createObjectURL(f);
      const img = document.createElement('img');
      img.src = url; img.alt = '';
      div.appendChild(img);
    }

    div.appendChild(del);
    grid.appendChild(div);
  });
  document.getElementById('addBtn').disabled = pendingFiles.length === 0;

  // carousel toggle visibility: only when 2+ images and no HTML files mixed in
  const imgCount = pendingFiles.filter(f => !isHtmlFile(f)).length;
  const htmlCount = pendingFiles.filter(isHtmlFile).length;
  const toggleWrap = document.getElementById('carouselToggleWrap');
  if (imgCount >= 2 && htmlCount === 0) {
    toggleWrap.style.display = 'flex';
  } else {
    toggleWrap.style.display = 'none';
    document.getElementById('carouselToggle').checked = false;
  }
}

// drag & drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); onFileSelect(e.dataTransfer.files); });

// ── Add cards ─────────────────────────────────
async function addCards() {
  const link = document.getElementById('linkUrl').value.trim();
  const isCarousel = document.getElementById('carouselToggle').checked;
  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  btn.textContent = '保存中…';

  if (isCarousel) {
    const images = pendingFiles.filter(f => !isHtmlFile(f));
    const images64 = [];
    for (const f of images) images64.push(await fileToBase64(f));
    const id = await dbOp('cards', 'readwrite', s => s.add({ type: 'carousel', images: images64, link: '' }));
    cards.push({ id, type: 'carousel', images: images64, link: '' });
  } else {
    for (const f of pendingFiles) {
      if (isHtmlFile(f)) {
        const html = await fileToText(f);
        const name = f.name;
        const id = await dbOp('cards', 'readwrite', s => s.add({ type: 'html', html, name, link }));
        cards.push({ id, type: 'html', html, name, link });
      } else {
        const base64 = await fileToBase64(f);
        const id = await dbOp('cards', 'readwrite', s => s.add({ type: 'image', base64, link }));
        cards.push({ id, type: 'image', base64, link });
      }
    }
  }

  btn.textContent = '追加する';
  closePanel();
  render();
}

// ── Replace ───────────────────────────────────
async function replaceCard(id, file) {
  const link = cards.find(c => c.id === id)?.link || '';
  const i = cards.findIndex(c => c.id === id);

  if (isHtmlFile(file)) {
    const html = await fileToText(file);
    const name = file.name;
    await dbOp('cards', 'readwrite', s => s.put({ id, type: 'html', html, name, link }));
    if (i !== -1) { cards[i] = { id, type: 'html', html, name, link }; }
  } else {
    const base64 = await fileToBase64(file);
    await dbOp('cards', 'readwrite', s => s.put({ id, type: 'image', base64, link }));
    if (i !== -1) { cards[i] = { id, type: 'image', base64, link }; }
  }
  render();
}

// ── Gap toggle ────────────────────────────────
async function toggleGap(id) {
  const c = cards.find(c => c.id === id);
  if (!c) return;
  if (c.gap === true || c.gap === undefined) c.gap = 'line';
  else if (c.gap === 'line') c.gap = false;
  else c.gap = true;
  await dbOp('cards', 'readwrite', s => s.put({
    id: c.id, type: c.type, html: c.html, base64: c.base64,
    images: c.images, name: c.name, link: c.link, gap: c.gap, order: c.order
  }));
  render();
}

// ── Move ─────────────────────────────────────
async function moveCard(fromIdx, toIdx) {
  if (toIdx < 0 || toIdx >= cards.length) return;
  const tmp = cards[fromIdx];
  cards[fromIdx] = cards[toIdx];
  cards[toIdx] = tmp;
  cards.forEach((c, i) => { c.order = i + 1; });
  for (const c of cards) {
    await dbOp('cards', 'readwrite', s => s.put({
      id: c.id, type: c.type, html: c.html, base64: c.base64,
      images: c.images, name: c.name, link: c.link, gap: c.gap, order: c.order
    }));
  }
  render();
}

// ── Delete ────────────────────────────────────
async function deleteCard(id) {
  await dbOp('cards', 'readwrite', s => s.delete(id));
  const i = cards.findIndex(c => c.id === id);
  if (i !== -1) cards.splice(i, 1);
  render();
}

// ── 編集用HTMLとして保存（データ埋め込み） ─────────
function downloadEditHTML() {
  const source = document.documentElement.outerHTML;
  const initData = { banners: banners, cards: cards };
  const initScript = `<scr` + `ipt>window.__ASOBIVA_INIT__ = ${JSON.stringify(initData)};</scr` + `ipt>`;
  const output = source.replace('</head>', initScript + '\n</head>');
  const blob = new Blob([output], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.download = `edit_${ts}.html`;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

// ── HTMLとして保存（静的スナップショット） ─────────
// ── 画像圧縮（公開用保存時のみ使用） ─────────────
function compressImage(base64) {
  return new Promise((res) => {
    const img = new Image();
    img.onload = () => {
      const MAX_W = 1200;
      let w = img.width, h = img.height;
      if (w > MAX_W) { h = Math.round(h * (MAX_W / w)); w = MAX_W; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const isPng = base64.startsWith('data:image/png');
      const mime = isPng ? 'image/png' : 'image/jpeg';
      const quality = isPng ? undefined : 0.8;
      res(canvas.toDataURL(mime, quality));
    };
    img.onerror = () => res(base64);
    img.src = base64;
  });
}

async function handleDownloadClick() {
  const btn = document.getElementById('downloadHtmlBtn');
  if (btn) {
    const original = btn.textContent;
    btn.textContent = '圧縮中…';
    btn.style.pointerEvents = 'none';
    await downloadHTML();
    btn.textContent = original;
    btn.style.pointerEvents = '';
  } else {
    await downloadHTML();
  }
  closeBurgerMenu();
}

async function downloadHTML() {
  // banner block (single header, 圧縮してから出力)
  let headerHTML;
  if (banners[1]) {
    const b64 = await compressImage(banners[1]);
    headerHTML = `    <div class="banner-slot"><img src="${b64}" alt=""></div>\n`;
  } else {
    headerHTML = `    <div class="banner-slot"><span class="slot-label">HEADER</span></div>\n`;
  }

  // card blocks（画像のみ圧縮してから出力）
  let cardsHTML = '';
  if (cards.length === 0) {
    cardsHTML = `  <div class="empty-section"><div class="empty-state"><strong>まだカードがありません</strong></div></div>\n`;
  } else {
    for (const c of cards) {
      const gapClass = c.gap === false || c.gap === 'nogap' ? ' no-gap' : c.gap === 'line' ? ' line-gap' : '';
      if (c.type === 'image') {
        const compressedB64 = await compressImage(c.base64);
        const tag = c.link
          ? `<a class="card" href="${c.link}" target="_blank" rel="noopener"><img src="${compressedB64}" alt=""></a>`
          : `<div class="card"><img src="${compressedB64}" alt=""></div>`;
        cardsHTML += `  <div class="card-section${gapClass}">${tag}</div>\n`;
      } else if (c.type === 'carousel') {
        const compressedImgs = [];
        for (const im of c.images) compressedImgs.push(await compressImage(im));
        const dots = compressedImgs.map((_, idx) => `<span class="${idx===0?'active':''}"></span>`).join('');
        const imgsJson = JSON.stringify(compressedImgs).replace(/"/g, '&quot;');
        cardsHTML += `  <div class="card-section${gapClass}"><div class="carousel-card" data-images="${imgsJson}" data-index="0" onclick="cyclerCarousel(this)"><img src="${compressedImgs[0]}" alt="">${compressedImgs.length > 1 ? `<div class="carousel-dots">${dots}</div><div class="carousel-count">1 / ${compressedImgs.length}</div>` : ''}</div></div>\n`;
      } else {
        const escaped = injectAutoResize(c.html).replace(/"/g, '&quot;');
        cardsHTML += `  <div class="card-section${gapClass}"><div class="html-card"><iframe srcdoc="${escaped}" loading="lazy" sandbox="allow-scripts allow-popups allow-forms allow-same-origin" style="height:60px" scrolling="no" onload="try{var h=this.contentDocument.documentElement.scrollHeight||this.contentDocument.body.scrollHeight;if(h>0)this.style.height=h+'px';}catch(e){}"></iframe></div></div>\n`;
      }
    }
  }

  const staticCSS = `

  const footerText = document.getElementById('footerText')?.textContent || 'ASOBIVA — i.roiro';
  const footerNoGap = document.getElementById('footerSection')?.classList.contains('no-gap');
  const footerGapClass = footerNoGap ? ' no-gap' : '';

  const html = `<!DOCTYPE html>
<html lang="ja">
<head>

  <div class="header-pair">
${headerHTML}  </div>

<scr` + `ipt>
window.addEventListener('message', function(e){
  if (e.data && e.data.type === 'asobiva-resize') {
    document.querySelectorAll('.html-card iframe').forEach(function(f){
      if (f.contentWindow === e.source) f.style.height = Math.max(60, e.data.height) + 'px';
    });

});
function cyclerCarousel(el){
  var images = JSON.parse(el.dataset.images);
  var idx = (parseInt(el.dataset.index, 10) + 1) % images.length;
  el.dataset.index = String(idx);
  el.querySelector('img').src = images[idx];
  var dots = el.querySelectorAll('.carousel-dots span');
  dots.forEach(function(d, i){ d.classList.toggle('active', i === idx); });
  var count = el.querySelector('.carousel-count');
  if (count) count.textContent = (idx + 1) + ' / ' + images.length;
}
</scr` + `ipt>
</body>
</html>
`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.download = `content_sample_${ts}.html`;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

init();
</script>
