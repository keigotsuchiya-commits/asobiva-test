<p><strong>ボルト / Bolt（14歳）</strong></p>
<p>コンテナ団地C-23で暮らす少年。荷物を運び、地図を集め、誰よりも遠くまで走り回る。元気でわんぱくだが、どこか不愛想。そして誰にも説明できない違和感を、この世界に抱いている。</p>
<p><strong>ナット / Nut（年齢不明）</strong></p>
<p>いつもボルトのそばにいる相棒。</p>
<p>犬のように見えるが、その正体を知る者はいない。<br>時折、誰にも見えない何かを感じ取ることがある。</p>
<p>その異変に気づいているのは、今のところボルトだけだ。</p>
